<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta name="theme-color" content="#06080d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="生活日常">
<title>生活日常</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@300;400;500;700&family=Azeret+Mono:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06080d;--bg2:#0d0f18;--bg3:#131620;--bg4:#1a1f30;
  --bdr:#1c2130;--bdr2:#262f48;
  --amb:#f0a500;--amb2:#ffc03a;
  --amb-bg:rgba(240,165,0,.09);--amb-bdr:rgba(240,165,0,.26);
  --grn:#2ed573;--red:#ff4757;--blu:#5b8fff;
  --txt:#edf1fb;--mid:#bbc5dc;--dim:#8898b8;--bright:#e8eef9;
  --mono:'Azeret Mono',monospace;--sans:'Noto Sans HK',sans-serif;
  --nav-h:60px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--txt);font-family:var(--sans);display:flex;flex-direction:column}

/* ══ PAGES ══ */
.page{display:none;flex:1;flex-direction:column;overflow:hidden;min-height:0}
.page.active{display:flex}

/* ══ BOTTOM NAV ══ */
.bottom-nav{flex-shrink:0;height:var(--nav-h);background:var(--bg2);border-top:1px solid var(--bdr);display:flex;padding-bottom:env(safe-area-inset-bottom,0)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;color:var(--mid);cursor:pointer;font-family:var(--sans);transition:color .15s;padding:5px 0}
.nav-btn .nav-ico{font-size:20px;line-height:1}
.nav-btn .nav-lbl{font-size:10px;font-weight:600;letter-spacing:.03em}
.nav-btn.active{color:var(--amb2)}

/* ══ WEATHER PANEL ══ */
.w-panel{flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--bdr);padding:10px 14px 10px;position:relative;overflow:hidden}
.w-panel::after{content:'';position:absolute;top:-40px;right:-20px;width:170px;height:170px;background:radial-gradient(circle,rgba(240,165,0,.07) 0%,transparent 70%);pointer-events:none}
.w-r1{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px}
.w-templeft{display:flex;align-items:center;gap:10px}
.w-icon{font-size:42px;line-height:1;flex-shrink:0}
.w-temp-big{font-family:var(--mono);font-size:52px;font-weight:700;line-height:1}
.w-temp-big sup{font-size:18px;font-weight:400;color:var(--mid);vertical-align:super}
.w-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.w-clock{font-family:var(--mono);font-size:30px;font-weight:700;color:var(--amb);line-height:1}
.w-date{font-size:11px;color:var(--mid)}
.w-btns{display:flex;gap:5px;margin-top:3px}
.w-btn{display:inline-flex;align-items:center;gap:4px;background:var(--bg3);border:1px solid var(--bdr2);border-radius:7px;padding:5px 10px;color:var(--mid);font-size:12px;cursor:pointer;font-family:var(--sans);transition:all .15s;white-space:nowrap}
.w-btn:active{border-color:var(--amb);color:var(--amb)}
.w-btn.spinning .ico{display:inline-block;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.w-warns{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.warn-pill{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:600;background:rgba(255,71,87,.13);border:1px solid rgba(255,71,87,.32);color:#ff8a96}
.warn-pill.amb{background:rgba(240,165,0,.11);border-color:rgba(240,165,0,.32);color:var(--amb2)}
.w-desc{font-size:13px;color:var(--bright);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:8px}
.w-desc:empty{display:none}
/* forecast strip */
.w-fore{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;margin-bottom:8px}
.w-fore::-webkit-scrollbar{display:none}
.fc{display:flex;flex-direction:column;align-items:center;gap:1px;background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;padding:5px 6px 6px;flex-shrink:0;min-width:66px}
.fc.hl{background:var(--bg4);border-color:var(--amb-bdr)}
.fc-date{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--bright);line-height:1.2}
.fc-date.named{color:var(--amb2)}
.fc-day{font-size:9px;color:var(--mid);line-height:1.1;margin-bottom:1px}
.fc-day.named{color:var(--amb2);font-weight:600}
.fc-ico{font-size:18px;margin:2px 0 1px}
.fc-tt{font-family:var(--mono);font-size:10px;display:flex;gap:2px;align-items:baseline}
.fc-hi{color:#ff8c5a}.fc-lo{color:var(--blu)}
.fc-sep{color:var(--dim);font-size:9px}
.fc-rh{font-family:var(--mono);font-size:9px;color:#7ba8ff;margin-top:1px}
.fc-psr{font-size:9px;color:var(--mid);margin-top:1px;display:flex;align-items:center;gap:2px}
.fc-psr-dot{display:inline-block;width:6px;height:6px;border-radius:50%;flex-shrink:0}
.fc-psr-dot.low{background:#2ed573}.fc-psr-dot.medlow{background:#7ba8ff}.fc-psr-dot.med{background:#f0a500}.fc-psr-dot.medhigh{background:#ff7b5a}.fc-psr-dot.high{background:#ff4757}
/* extra weather stats row */
.w-hum-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(91,143,255,.1);border:1px solid rgba(91,143,255,.28);border-radius:6px;padding:3px 8px;margin-top:4px;cursor:pointer}
.w-hum-val{font-family:var(--mono);font-size:16px;font-weight:700;color:#7ba8ff;line-height:1}
.w-hum-lbl{font-size:10px;color:var(--mid);line-height:1}
.wdet-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.wdet-card{background:var(--bg3);border:1px solid var(--bdr2);border-radius:11px;padding:13px 14px}
.wdet-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);font-family:var(--mono);margin-bottom:5px}
.wdet-val{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--bright);line-height:1;margin-bottom:3px}
.wdet-sub{font-size:11px;color:var(--mid);line-height:1.5}
.wdet-full{grid-column:1/-1}
.wdet-tide-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.tide-item{display:flex;flex-direction:column;align-items:center;background:rgba(91,143,255,.08);border:1px solid rgba(91,143,255,.2);border-radius:8px;padding:6px 10px;flex:1;min-width:70px}
.tide-type{font-size:10px;color:var(--mid);margin-bottom:2px}
.tide-time{font-family:var(--mono);font-size:14px;font-weight:700;color:#7ba8ff}
.tide-ht{font-family:var(--mono);font-size:11px;color:var(--mid);margin-top:1px}
.loc-section-title{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);font-family:var(--mono);margin:14px 0 8px;padding-left:1px}
.rsl-focus{background:rgba(240,165,0,.06);border-radius:8px}
.srch-section-lbl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);font-family:var(--mono);margin:10px 0 6px;padding-left:2px}
.srch-section-lbl:first-child{margin-top:0}

/* ══ PROFILE TABS ══ */
.profiles-bar{flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--bdr);padding:5px 10px;display:flex;align-items:center;gap:6px;overflow-x:auto;scrollbar-width:none;min-height:60px}
.profiles-bar::-webkit-scrollbar{display:none}
.profile-tab{display:flex;align-items:center;justify-content:center;height:46px;padding:0 20px;border-radius:12px;font-size:16px;font-weight:500;cursor:pointer;color:var(--mid);background:var(--bg3);border:1px solid var(--bdr);white-space:nowrap;flex-shrink:0;transition:all .15s;font-family:var(--sans);user-select:none;touch-action:none}
.profile-tab.active{background:var(--amb-bg);color:var(--amb2);border-color:var(--amb-bdr)}
.profile-tab.nearby-tab{color:var(--blu);border-color:rgba(91,143,255,.3)}
.profile-tab.nearby-tab.active{background:rgba(91,143,255,.1);color:#7ba8ff;border-color:rgba(91,143,255,.45)}
.profile-tab.tab-ghost{opacity:.25}
.profile-tab.tab-slot{border:1px dashed var(--amb-bdr);background:rgba(240,165,0,.04);color:transparent}
.add-profile-btn{flex-shrink:0;height:46px;min-width:46px;border-radius:12px;background:var(--bg3);border:1px solid var(--bdr2);color:var(--mid);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.add-profile-btn:active{border-color:var(--amb);color:var(--amb)}

/* ══ BUS ══ */
.bus-sec{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.bus-hdr{flex-shrink:0;display:flex;align-items:center;gap:7px;padding:6px 12px 5px}
.bus-hdr-lbl{font-size:10px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--dim);font-family:var(--mono);flex:1}
.eta-mode-btn{display:flex;align-items:center;gap:4px;background:var(--bg3);border:1px solid var(--bdr2);border-radius:8px;padding:5px 9px;color:var(--mid);font-size:11px;font-weight:500;cursor:pointer;flex-shrink:0;white-space:nowrap;font-family:var(--sans);transition:all .15s}
.eta-mode-btn.mins{border-color:rgba(91,143,255,.35);color:#7ba8ff;background:rgba(91,143,255,.08)}
.add-btn{display:flex;align-items:center;gap:4px;background:var(--amb-bg);border:1px solid var(--amb-bdr);border-radius:8px;padding:5px 12px;color:var(--amb);font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0;white-space:nowrap}
.add-btn:active{opacity:.7}
.dist-row{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:2px 12px 6px;overflow-x:auto;scrollbar-width:none}
.dist-row::-webkit-scrollbar{display:none}
.dist-lbl{font-size:11px;color:var(--mid);white-space:nowrap;flex-shrink:0}
.dist-pill{flex-shrink:0;padding:4px 11px;border-radius:20px;font-size:11px;font-weight:600;font-family:var(--mono);background:var(--bg3);border:1px solid var(--bdr);color:var(--mid);cursor:pointer;transition:all .15s}
.dist-pill.active{background:rgba(91,143,255,.12);border-color:rgba(91,143,255,.45);color:#7ba8ff}
.bus-list{flex:1;overflow-y:auto;padding:0 10px 8px;scrollbar-width:thin;scrollbar-color:var(--bdr) transparent}
.bus-card{display:flex;align-items:stretch;background:var(--bg2);border:1px solid var(--bdr);border-radius:12px;margin-bottom:8px;overflow:hidden;animation:slideIn .2s ease both;position:relative;user-select:none;transition:border-color .15s,opacity .15s}
.bus-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--dim);border-radius:12px 0 0 12px;transition:background .25s}
.bus-card.soon::before{background:var(--red)}.bus-card.coming::before{background:var(--amb)}.bus-card.ok::before{background:var(--grn)}
.bus-card.card-ghost{opacity:.25}.bus-card.card-slot{border:1px dashed var(--amb-bdr);background:rgba(240,165,0,.04)}.bus-card.card-slot::before{background:transparent}
@keyframes slideIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.drag-handle{display:flex;align-items:center;justify-content:center;padding:0 8px;color:var(--dim);font-size:16px;cursor:grab;flex-shrink:0;touch-action:none;letter-spacing:-2px}
.bus-badge{display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--amb-bg);border-right:1px solid var(--amb-bdr);color:var(--amb2);font-family:var(--mono);font-size:32px;font-weight:700;width:80px;flex-shrink:0;text-shadow:0 0 18px rgba(240,165,0,.28);letter-spacing:-1px;gap:2px;padding:6px 4px}
.bus-info{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;padding:10px 11px}
.bus-stop{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.bus-dest{font-size:12px;color:var(--mid)}
.nearby-dist{font-family:var(--mono);font-size:10px;color:var(--blu);margin-left:5px}
.bus-eta-wrap{display:flex;align-items:center;padding:0 11px 0 4px;flex-shrink:0}
.eta-col{display:flex;flex-direction:column;align-items:flex-end;gap:1px}
.e1{font-family:var(--mono);font-size:25px;font-weight:700;line-height:1.1}
.e1.sc{color:var(--red)}.e1.cc{color:var(--amb2)}.e1.oc{color:var(--grn)}
.e2{font-family:var(--mono);font-size:14px;color:var(--mid);line-height:1.2}
.e3{font-family:var(--mono);font-size:11px;color:var(--dim);line-height:1.2}
.e-none{font-family:var(--mono);font-size:12px;color:var(--dim)}
.bus-rm{display:flex;align-items:center;background:none;border:none;color:var(--dim);font-size:17px;padding:0 10px;cursor:pointer;flex-shrink:0;transition:color .15s;align-self:stretch}
.bus-rm:active{color:var(--red)}
.empty-state{text-align:center;padding:30px 20px;color:var(--mid)}
.empty-icon{font-size:40px;margin-bottom:10px;opacity:.25}
.empty-text{font-size:15px;margin-bottom:4px}
.empty-sub{font-size:12px;color:var(--dim);line-height:1.6}

/* ══ BUS CARD V2 ══ */
.bus-card-v2{display:flex;align-items:stretch;background:var(--bg2);border:1px solid var(--bdr);border-radius:12px;margin-bottom:8px;overflow:hidden;animation:slideIn .2s ease both;position:relative;user-select:none;transition:border-color .15s,opacity .15s}
.bus-card-v2::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--dim);border-radius:12px 0 0 12px;transition:background .25s}
.bus-card-v2.soon::before{background:var(--red)}.bus-card-v2.coming::before{background:var(--amb)}.bus-card-v2.ok::before{background:var(--grn)}
.bus-card-v2.card-ghost{opacity:.25}.bus-card-v2.card-slot{border:1px dashed var(--amb-bdr);background:rgba(240,165,0,.04)}.bus-card-v2.card-slot::before{background:transparent}
.bcv2-badge{display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--amb-bg);border-right:1px solid var(--amb-bdr);padding:10px 7px;min-width:68px;max-width:68px;flex-shrink:0}
.bcv2-route-no{font-family:var(--mono);font-weight:700;color:var(--amb2);letter-spacing:-1px;line-height:1;text-align:center;white-space:nowrap;overflow:hidden}
.bcv2-co-name{font-size:9px;color:var(--mid);margin-top:3px;line-height:1.4;text-align:center;white-space:nowrap}
.bcv2-mid{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;padding:9px 6px 9px 10px}
.bcv2-dest-lbl{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;color:var(--bright)}
.bcv2-stop-lbl{font-size:11px;color:var(--mid);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bcv2-etas{display:flex;flex-direction:column;justify-content:center;padding:7px 10px 7px 2px;flex-shrink:0;gap:2px;min-width:118px}
.bcv2-eta-row{display:flex;align-items:center;gap:4px;justify-content:flex-end}
.bcv2-eta-co{font-size:9px;color:var(--dim);flex-shrink:0;min-width:22px;text-align:left}
.bcv2-eta-time{font-family:var(--mono);font-size:11px;color:var(--mid);flex-shrink:0;min-width:38px;text-align:right}
.bcv2-eta-mins{font-family:var(--mono);font-size:11px;font-weight:600;border-radius:5px;padding:1px 6px;text-align:center;flex-shrink:0;min-width:32px}
.bcv2-eta-mins.sc{background:rgba(255,71,87,.18);color:var(--red)}
.bcv2-eta-mins.cc{background:rgba(240,165,0,.13);color:var(--amb2)}
.bcv2-eta-mins.oc{color:var(--grn)}
.bcv2-eta-row.e-first .bcv2-eta-time{font-size:13px;color:var(--bright)}
.bcv2-eta-row.e-first .bcv2-eta-mins{font-size:14px;font-weight:700;padding:2px 7px}
.bcv2-eta-row.e-first .bcv2-eta-co{font-size:10px;color:var(--amb2)}
.bcv2-rm-btn{display:flex;align-items:center;background:none;border:none;color:var(--dim);font-size:17px;padding:0 10px;cursor:pointer;flex-shrink:0;transition:color .15s;align-self:stretch}
.bcv2-rm-btn:active{color:var(--red)}
.bcv2-drag-hdl{display:flex;align-items:center;justify-content:center;padding:0 5px;color:var(--dim);font-size:16px;cursor:grab;flex-shrink:0;touch-action:none;letter-spacing:-2px}

/* ══ NEWS & TRAFFIC PAGES ══ */
.feed-page{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.sub-tab-bar{flex-shrink:0;display:flex;background:var(--bg2);border-bottom:1px solid var(--bdr);padding:8px 12px;gap:7px;overflow-x:auto;scrollbar-width:none}
.sub-tab-bar::-webkit-scrollbar{display:none}
.sub-tab{height:36px;padding:0 16px;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;color:var(--mid);background:var(--bg3);border:1px solid var(--bdr);white-space:nowrap;flex-shrink:0;transition:all .15s;font-family:var(--sans)}
.sub-tab.active{background:var(--amb-bg);color:var(--amb2);border-color:var(--amb-bdr)}
.feed-list{flex:1;overflow-y:auto;padding:8px 12px 12px;scrollbar-width:thin;scrollbar-color:var(--bdr) transparent}
.feed-item{background:var(--bg2);border:1px solid var(--bdr);border-radius:11px;margin-bottom:8px;padding:12px 14px;cursor:pointer;transition:border-color .15s;animation:slideIn .2s ease both;text-decoration:none;display:block;color:inherit}
.feed-item:active{border-color:var(--amb-bdr)}
.feed-item-title{font-size:16px;font-weight:500;line-height:1.55;margin-bottom:6px;color:var(--bright)}
.feed-item-meta{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--mid)}
.feed-item-src{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;font-family:var(--mono);color:var(--dim)}
.feed-item-desc{font-size:14px;color:var(--mid);margin-top:6px;line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.feed-err{text-align:center;padding:30px 20px;color:var(--mid);font-size:13px;line-height:1.7}
.feed-refresh-row{display:flex;justify-content:flex-end;padding:2px 0 6px;flex-shrink:0}
.feed-refresh-btn{background:none;border:none;color:var(--dim);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px;font-family:var(--sans);padding:0 2px}
.feed-refresh-btn:active{color:var(--amb)}

/* ══ TRAFFIC CARD V2 (運輸署特別交通消息第二代) ══ */
.tc-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:12px;margin-bottom:8px;overflow:hidden;animation:slideIn .2s ease both;position:relative;cursor:pointer;transition:border-color .15s}
.tc-card:active{border-color:var(--amb-bdr)}
.tc-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:12px 0 0 12px}
.tc-card.tc-new::before{background:var(--red)}
.tc-card.tc-updated::before{background:var(--amb)}
.tc-card.tc-closed::before{background:var(--grn);opacity:.5}
.tc-card.tc-closed{opacity:.6}
.tc-inner{padding:10px 13px 10px 16px}
.tc-hdr{display:flex;align-items:center;gap:6px;margin-bottom:5px;flex-wrap:wrap}
.tc-type-badge{font-size:10px;font-weight:700;border-radius:5px;padding:2px 8px;background:rgba(255,71,87,.13);color:#ff8a96;border:1px solid rgba(255,71,87,.28);white-space:nowrap}
.tc-type-badge.tc-t-works{background:rgba(240,165,0,.12);color:var(--amb2);border-color:rgba(240,165,0,.28)}
.tc-type-badge.tc-t-transit{background:rgba(46,213,115,.1);color:#2ed573;border-color:rgba(46,213,115,.25)}
.tc-type-badge.tc-t-other{background:rgba(91,143,255,.1);color:#7ba8ff;border-color:rgba(91,143,255,.22)}
.tc-type-badge.tc-t-rthk{background:rgba(91,143,255,.1);color:#7ba8ff;border-color:rgba(91,143,255,.22)}
.tc-status-badge{font-size:10px;font-weight:600;border-radius:5px;padding:2px 7px;white-space:nowrap}
.tc-status-badge.st-new{background:rgba(255,71,87,.15);color:#ff8a96}
.tc-status-badge.st-updated{background:rgba(240,165,0,.15);color:var(--amb2)}
.tc-status-badge.st-closed{background:rgba(46,213,115,.12);color:#2ed573}
.tc-time{font-family:var(--mono);font-size:10px;color:var(--dim);margin-left:auto;white-space:nowrap;flex-shrink:0}
.tc-heading{font-size:14px;font-weight:600;color:var(--bright);margin-bottom:3px;line-height:1.45}
.tc-location{font-size:12px;color:var(--mid);margin-bottom:5px;line-height:1.5}
.tc-content{font-size:13px;color:var(--txt);line-height:1.7;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;white-space:pre-wrap}
.tc-content.expanded{-webkit-line-clamp:unset;display:block}
.tc-footer{display:flex;align-items:center;gap:6px;margin-top:7px;flex-wrap:wrap}
.tc-district{font-size:10px;color:var(--dim);font-family:var(--mono);background:var(--bg3);border:1px solid var(--bdr);border-radius:5px;padding:2px 7px;white-space:nowrap}
.tc-expand-btn{margin-left:auto;font-size:11px;color:var(--amb);background:none;border:none;cursor:pointer;font-family:var(--sans);padding:2px 0;flex-shrink:0}
.tc-count-badge{display:inline-flex;align-items:center;justify-content:center;background:var(--red);color:#fff;border-radius:8px;font-size:10px;font-weight:700;font-family:var(--mono);min-width:18px;height:18px;padding:0 5px;margin-left:4px;vertical-align:middle}


/* ══ SETTINGS ══ */
.settings-scroll{flex:1;overflow-y:auto;padding:14px 14px 20px}
.sett-section-title{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);font-family:var(--mono);margin:18px 0 8px;padding-left:2px}
.sett-section-title:first-child{margin-top:0}
.sett-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:13px;overflow:hidden;margin-bottom:4px}
.sett-row{display:flex;align-items:center;padding:13px 15px;gap:11px;cursor:pointer;transition:background .15s;border-bottom:1px solid var(--bdr)}
.sett-row:last-child{border-bottom:none}
.sett-row:active{background:var(--bg3)}
.sett-ico{font-size:19px;flex-shrink:0;width:26px;text-align:center}
.sett-lbl{flex:1}.sett-lbl-main{font-size:14px;font-weight:500}.sett-lbl-sub{font-size:11px;color:var(--mid);margin-top:2px}
.sett-chev{color:var(--dim);font-size:17px}
.history-card{background:var(--bg2);border:1px solid var(--bdr2);border-radius:13px;padding:14px 16px;margin-bottom:4px}
.history-date{font-family:var(--mono);font-size:11px;color:var(--amb2);font-weight:600;margin-bottom:5px;letter-spacing:.05em}
.history-year{font-family:var(--mono);font-size:26px;font-weight:700;color:var(--amb);line-height:1;margin-bottom:5px}
.history-text{font-size:13px;color:var(--bright);line-height:1.65}
.history-loading{font-size:13px;color:var(--mid);text-align:center;padding:16px 0}
.history-src{font-size:10px;color:var(--dim);margin-top:7px;font-family:var(--mono)}
.auto-tab-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:13px;margin-bottom:8px;overflow:hidden}
.auto-tab-hdr{display:flex;align-items:center;padding:12px 14px;gap:10px;border-bottom:1px solid var(--bdr)}
.auto-tab-name{flex:1;font-size:14px;font-weight:600}
.toggle{position:relative;width:44px;height:26px;cursor:pointer}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--bdr2);border-radius:13px;transition:.2s}
.toggle-slider::before{content:'';position:absolute;left:3px;top:3px;width:20px;height:20px;background:var(--mid);border-radius:50%;transition:.2s}
.toggle input:checked+.toggle-slider{background:var(--amb)}
.toggle input:checked+.toggle-slider::before{left:21px;background:#000}
.auto-tab-body{padding:10px 14px 12px}
.days-row{display:flex;gap:5px;margin-bottom:9px}
.day-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--bdr2);background:var(--bg3);color:var(--mid);font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:var(--sans)}
.day-btn.on{border-color:var(--amb-bdr);background:var(--amb-bg);color:var(--amb2)}
.time-row{display:flex;align-items:center;gap:7px}
.time-lbl{font-size:12px;color:var(--mid);white-space:nowrap}
.time-inp{background:var(--bg3);border:1px solid var(--bdr2);border-radius:8px;padding:6px 9px;color:var(--txt);font-family:var(--mono);font-size:14px;width:88px;outline:none;transition:border-color .15s}
.time-inp:focus{border-color:var(--amb)}
.copy-block{background:var(--bg2);border:1px solid var(--bdr);border-radius:13px;padding:16px;text-align:center}
.copy-app{font-size:19px;font-weight:700;margin-bottom:3px;color:var(--amb2)}
.copy-ver{font-size:11px;color:var(--mid);margin-bottom:9px;font-family:var(--mono)}
.copy-line{font-size:12px;color:var(--mid);line-height:1.85}
.copy-line a{color:var(--blu);text-decoration:none}

/* ══ OVERLAY ══ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.76);z-index:50;display:none;align-items:flex-end;backdrop-filter:blur(5px)}
.overlay.open{display:flex}
.drawer{background:var(--bg2);border-top:1px solid var(--bdr2);border-radius:20px 20px 0 0;width:100%;max-height:90dvh;display:flex;flex-direction:column;animation:drawerUp .24s cubic-bezier(.34,1.56,.64,1)}
@keyframes drawerUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.drawer-handle{width:36px;height:4px;background:var(--bdr2);border-radius:2px;margin:11px auto 0;flex-shrink:0}
.drawer-title{font-size:15px;font-weight:600;padding:11px 15px 8px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.drawer-close{background:var(--bg3);border:none;color:var(--mid);width:28px;height:28px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.drawer-body{flex:1;overflow-y:auto;padding:0 14px 26px}
.search-row{display:flex;gap:8px;margin-bottom:12px}
.d-input{flex:1;background:var(--bg3);border:1px solid var(--bdr2);border-radius:10px;padding:11px 13px;color:var(--txt);font-family:var(--mono);font-size:18px;letter-spacing:.12em;text-transform:uppercase;outline:none;transition:border-color .15s}
.d-input::placeholder{color:var(--dim);font-size:13px;text-transform:none;letter-spacing:normal;font-family:var(--sans)}
.d-input:focus{border-color:var(--amb)}
.d-input.plain{font-size:15px;letter-spacing:normal;text-transform:none;font-family:var(--sans)}
.d-btn{background:var(--amb);color:#000;border:none;border-radius:10px;padding:11px 14px;font-weight:700;font-size:14px;cursor:pointer;font-family:var(--sans)}
.d-btn:active{opacity:.8}
.sec-lbl{font-size:10px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--dim);font-family:var(--mono);margin-bottom:8px}
.result-item{display:flex;align-items:center;gap:10px;padding:11px;background:var(--bg3);border:1px solid var(--bdr);border-radius:10px;margin-bottom:6px;cursor:pointer;transition:border-color .15s}
.result-item:active{border-color:var(--amb)}
.rn{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--amb2);min-width:42px}
.ri{flex:1}.ri-dest{font-size:14px;font-weight:500}.ri-orig{font-size:11px;color:var(--mid);margin-top:2px}
.chev{color:var(--dim);font-size:17px}
.stop-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg3);border:1px solid var(--bdr);border-radius:10px;margin-bottom:5px;cursor:pointer;transition:border-color .15s}
.stop-item:active{border-color:var(--amb)}
.stop-seq{font-family:var(--mono);font-size:11px;color:var(--dim);min-width:22px}
.stop-name{flex:1;font-size:13px}
.back-link{display:inline-flex;align-items:center;gap:5px;color:var(--amb);font-size:13px;cursor:pointer;margin-bottom:11px;background:none;border:none;font-family:var(--sans);padding:0}
.loc-gps-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:rgba(91,143,255,.1);border:1px solid rgba(91,143,255,.3);border-radius:10px;padding:11px;margin-bottom:10px;color:#7ba8ff;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans)}
.loc-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.loc-item{background:var(--bg3);border:1px solid var(--bdr);border-radius:10px;padding:10px;cursor:pointer;transition:all .15s;text-align:center}
.loc-item:active,.loc-item.sel{border-color:var(--amb);background:var(--amb-bg)}
.loc-name{font-size:13px;font-weight:500}.loc-reg{font-size:11px;color:var(--mid);margin-top:2px}
.rename-row{display:flex;gap:8px;margin-bottom:11px}
.del-btn{width:100%;background:rgba(255,71,87,.12);border:1px solid rgba(255,71,87,.3);color:#ff7b89;border-radius:10px;padding:12px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);margin-top:4px}
.del-btn:active{opacity:.8}
.spinner{width:20px;height:20px;border:2px solid var(--bdr2);border-top-color:var(--amb);border-radius:50%;animation:spin .7s linear infinite;margin:28px auto}
.msg{text-align:center;color:var(--mid);font-size:13px;padding:22px 0;line-height:1.7}
.toast{position:fixed;bottom:calc(var(--nav-h)+12px);left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--bdr2);border-radius:10px;padding:9px 16px;font-size:13px;color:var(--bright);white-space:nowrap;z-index:200;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
.float-clone{position:fixed;z-index:999;pointer-events:none;box-shadow:0 10px 32px rgba(0,0,0,.7);border-radius:12px;opacity:.88}
.route-detail-hdr{display:flex;align-items:center;gap:12px;padding:14px 0 12px;border-bottom:1px solid var(--bdr);margin-bottom:12px}
.route-detail-badge{font-family:var(--mono);font-size:32px;font-weight:700;color:var(--amb2);background:var(--amb-bg);border:1px solid var(--amb-bdr);border-radius:10px;padding:6px 16px;flex-shrink:0}
.route-detail-info{flex:1}
.route-detail-dest{font-size:15px;font-weight:600;color:var(--bright)}
.route-detail-orig{font-size:12px;color:var(--mid);margin-top:3px}
.route-stop-list{display:flex;flex-direction:column;gap:0}
.rsl-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:background .12s;position:relative}
.rsl-item:active{background:var(--bg3)}
.rsl-line{position:absolute;left:23px;top:0;bottom:0;width:2px;background:var(--bdr2);z-index:0}
.rsl-item:first-child .rsl-line{top:50%}
.rsl-item:last-child .rsl-line{bottom:50%}
.rsl-dot{width:10px;height:10px;border-radius:50%;background:var(--bdr2);border:2px solid var(--bg);flex-shrink:0;z-index:1}
.rsl-dot.first,.rsl-dot.last{background:var(--amb);width:12px;height:12px}
.rsl-seq{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:20px;text-align:right;z-index:1}
.rsl-name{font-size:14px;color:var(--txt);flex:1;z-index:1}
.rsl-eta{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--grn);z-index:1;text-align:right}
.rsl-eta.soon{color:var(--red)}.rsl-eta.coming{color:var(--amb2)}
.dir-tab-row{display:flex;gap:6px;margin-bottom:12px}
.dir-tab{flex:1;padding:9px;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;background:var(--bg3);border:1px solid var(--bdr);color:var(--mid);text-align:center;transition:all .15s}
.dir-tab.active{background:var(--amb-bg);border-color:var(--amb-bdr);color:var(--amb2)}
.search-hint{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.search-hint-pill{font-family:var(--mono);font-size:12px;background:var(--bg3);border:1px solid var(--bdr);border-radius:7px;padding:4px 10px;color:var(--mid);cursor:pointer;transition:all .12s}
.search-hint-pill:active{border-color:var(--amb);color:var(--amb)}
</style>
</head>
<body>

<!-- ══ HOME ══ -->
<div class="page active" id="page-home">
  <div class="w-panel">
    <div class="w-r1">
      <div class="w-templeft">
        <div class="w-icon" id="w-icon">🌡</div>

<!-- ══ NEWS ══ -->
<div class="page" id="page-news">

      <button class="sub-tab active" id="ntab-all"     onclick="switchNewsFeed('all')">📋 全部</button>

</div>

<!-- ══ TRAFFIC ══ -->
<div class="page" id="page-traffic">
  <div class="feed-page">
    <div class="sub-tab-bar" id="traffic-cat-bar">
      <button class="sub-tab active" id="ttab-all"      onclick="switchTrafficCat('all')">📋 全部</button>
      <button class="sub-tab"        id="ttab-accident" onclick="switchTrafficCat('accident')">🚗 交通意外</button>
      <button class="sub-tab"        id="ttab-works"    onclick="switchTrafficCat('works')">🚧 道路工程</button>
      <button class="sub-tab"        id="ttab-transit"  onclick="switchTrafficCat('transit')">🚌 公共交通</button>
      <button class="sub-tab"        id="ttab-new"      onclick="switchTrafficCat('new')">🆕 最新/更新</button>
      <button class="sub-tab"        id="ttab-closed"   onclick="switchTrafficCat('closed')">✅ 完結</button>
    </div>

const _fareCache={};
async function fetchKMBFare(route,dir,svcType){
  const bound=(dir==='O'||dir==='outbound')?'outbound':'inbound';
  const key=`kmb_${route}_${bound}_${svcType}`;
  if(_fareCache[key]!==undefined)return _fareCache[key];
  try{
    const ctrl=new AbortController();const _ft=setTimeout(()=>ctrl.abort(),10000);
    let resp;
    try{resp=await fetch(`${KMB}/fare/${route}/${bound}/${svcType}`,{signal:ctrl.signal});}
    finally{clearTimeout(_ft);}
    // 404 = route has no fare data; cache as null permanently
    if(resp.status===404){_fareCache[key]=null;return null;}
    // Other HTTP errors = transient; don't cache, allow retry
    if(!resp.ok)return null;
    const d=await resp.json();
    const fares=(d.data||[]).map(f=>parseFloat(f.fare||f.fare_full||0)).filter(f=>f>0);
    const maxFare=fares.length?Math.max(...fares):null;
    _fareCache[key]=maxFare!==null?Math.round(maxFare*10)/10:null;
    return _fareCache[key];
  }catch(e){
    // Network/abort/timeout errors: don't cache, allow retry next time
    if(e?.name==='AbortError'||e?.name==='TypeError')return null;
    _fareCache[key]=null;return null;
  }
}

const _idb={
  _db:null,
  async open(){
    if(this._db)return this._db;
    return new Promise((res,rej)=>{
      const req=indexedDB.open('swd-cache',1);
      req.onupgradeneeded=e=>e.target.result.createObjectStore('kv');
      req.onsuccess=e=>{this._db=e.target.result;res(this._db);};
      req.onerror=()=>rej(req.error);
    });
  },
  async get(key){
    try{
      const db=await this.open();
      return new Promise((res,rej)=>{
        const req=db.transaction('kv').objectStore('kv').get(key);
        req.onsuccess=()=>res(req.result);
        req.onerror=()=>rej(req.error);
      });
    }catch{return null;}
  },
  async set(key,data,ttl){
    try{
      const db=await this.open();
      return new Promise((res,rej)=>{
        const req=db.transaction('kv','readwrite').objectStore('kv').put({data,ts:Date.now(),ttl},key);
        req.onsuccess=()=>res();
        req.onerror=()=>rej(req.error);
      });
    }catch{}
  },
  async fresh(key){
    const entry=await this.get(key);
    if(!entry||!entry.data)return null;
    if(Date.now()-entry.ts>entry.ttl)return null;
    return entry.data;
  },
};

function haverDist(la1,ln1,la2,ln2){
  const R=6371000,r=Math.PI/180,dLa=(la2-la1)*r,dLn=(ln2-ln1)*r;
  return 2*R*Math.asin(Math.sqrt(Math.sin(dLa/2)**2+Math.cos(la1*r)*Math.cos(la2*r)*Math.sin(dLn/2)**2));
}
function nearestOf(list,lat,lng){let best=list[0],minD=Infinity;list.forEach(s=>{const d=Math.hypot(s.lat-lat,s.lng-lng);if(d<minD){minD=d;best=s}});return best;}
function num(v){if(v==null)return null;if(typeof v==='number')return isNaN(v)?null:v;if(typeof v==='string'){const n=parseFloat(v);return isNaN(n)?null:n}if(typeof v==='object')return num(v.value??v.data??Object.values(v).find(x=>typeof x==='number'||typeof x==='string'));return null;}
function hkoFind(arr,stn){if(!Array.isArray(arr)||!arr.length)return null;return arr.find(d=>d.place===stn)??arr[0];}
function esc(s){return(s||'').replace(/'/g,"\\'")}
function relTime(dateStr){if(!dateStr)return'';const d=new Date(dateStr);if(isNaN(d))return'';const diff=Math.round((Date.now()-d)/60000);if(diff<1)return'剛才';if(diff<60)return diff+'分鐘前';if(diff<1440)return Math.round(diff/60)+'小時前';return Math.round(diff/1440)+'天前';}

// GPS in-flight guard (prevents double-fetch)
let _gpsInFlight=false;

async function autoLocate(){
  document.getElementById('w-loc-lbl').textContent=selectedStn;
  if(!navigator.geolocation)return;

  // ── Step 1: restore cached position immediately so nearby tab doesn't block ──
  const cached=_loadPosCache();
  if(cached&&!nearbyLat){
    nearbyLat=cached.lat;nearbyLng=cached.lng;
    const near=nearestOf(RHRREAD_STNS,nearbyLat,nearbyLng);
    if(near.n!==selectedStn){selectedStn=near.n;localStorage.setItem('hko_stn',near.n);}
    document.getElementById('w-loc-lbl').textContent=selectedStn;
    // Render nearby from cache immediately (will refresh when fresh GPS arrives)
    if(activePid===NEARBY_PID)loadNearby();
  }

  // ── Step 2: fetch fresh GPS (maximumAge=5min so browser may return instantly) ──
  if(_gpsInFlight)return;
  _gpsInFlight=true;
  navigator.geolocation.getCurrentPosition(
    pos=>{
      _gpsInFlight=false;
      nearbyLat=pos.coords.latitude;nearbyLng=pos.coords.longitude;
      _savePosCache(nearbyLat,nearbyLng);
      const near=nearestOf(RHRREAD_STNS,nearbyLat,nearbyLng);
      if(near.n!==selectedStn){selectedStn=near.n;localStorage.setItem('hko_stn',near.n);loadWeather();}
      document.getElementById('w-loc-lbl').textContent=selectedStn;
      const stnSub=document.getElementById('sett-stn-sub');if(stnSub)stnSub.textContent=selectedStn;
      if(activePid===NEARBY_PID)loadNearby();
    },
    err=>{
      _gpsInFlight=false;
      // GPS failed but we may already have cached coords — nearby still works
      if(!nearbyLat&&activePid===NEARBY_PID){
        const el=document.getElementById('bus-list');
        if(el&&!el.querySelector('.bus-card-v2')){
          el.innerHTML=`<div class="msg" style="padding:24px 20px">
            <div style="font-size:28px;margin-bottom:10px">📍</div>
            <div style="font-size:14px;color:var(--bright);margin-bottom:6px">位置取得失敗</div>
            <div style="font-size:12px;color:var(--mid);line-height:1.7;margin-bottom:14px">
              ${err.code===1?'位置權限被拒絕，請到瀏覽器設定中允許位置存取。':'無法取得 GPS 信號，請移至室外後重試。'}
            </div>
            <button onclick="requestGPS()" style="background:var(--blu);color:#fff;border:none;border-radius:10px;padding:10px 22px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans)">📡 重試</button>
          </div>`;
        }
      }
    },
    {timeout:15000,maximumAge:5*60*1000,enableHighAccuracy:false}
  );
}

function getAutoTabStatus(){
  const cfg=loadAutoTabs();const now=new Date();const dow=now.getDay(),hhmm=now.getHours()*60+now.getMinutes();
  const timeStr=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  for(const p of profiles){const c=cfg[p.id];if(!c||!c.enabled)continue;if(!c.days[dow])continue;const[fh,fm]=(c.from||'00:00').split(':').map(Number);const[th,tm]=(c.to||'23:59').split(':').map(Number);if(hhmm>=fh*60+fm&&hhmm<=th*60+tm)return{matched:true,name:p.name,msg:`✅ 現在 ${timeStr}，正在「${p.name}」時間內`};}
  const upcoming=[];for(const p of profiles){const c=cfg[p.id];if(!c||!c.enabled)continue;const ad=c.days.map((on,i)=>on?DAY[i]:null).filter(Boolean).join('');if(ad)upcoming.push(`「${p.name}」${ad} ${c.from}–${c.to}`);}
  if(upcoming.length)return{matched:false,msg:`現在 ${timeStr} 不在任何時間段（${upcoming.join('；')}）→ 顯示附近`};
  return{matched:false,msg:`現在 ${timeStr}，未設定任何自動跳轉規則`};
}

async function loadExtraWeather(){
  const now=new Date();
  const y=now.getFullYear(),mo=now.getMonth()+1,d=now.getDate();
  const moStr=String(mo).padStart(2,'0');
  const stnCoords=RHRREAD_STNS.find(s=>s.n===selectedStn);
  const lat=nearbyLat??stnCoords?.lat;
  const lng=nearbyLng??stnCoords?.lng;
  // Try to get actual max/min from rhrread keys
  try{
    const rhr=await fetch(`${HKO}?dataType=rhrread&lang=tc`).then(r=>r.json());
    for(const k of['maximumTemperature','maxTemperature','highTemperature']){
      const arr=rhr[k]?.data||[];const e=hkoFind(arr,selectedStn)||arr[0];
      if(num(e?.value)!=null){wxDetails.todayMaxT=num(e.value);break}
    }
    for(const k of['minimumTemperature','minTemperature','lowTemperature']){
      const arr=rhr[k]?.data||[];const e=hkoFind(arr,selectedStn)||arr[0];
      if(num(e?.value)!=null){wxDetails.todayMinT=num(e.value);break}
    }
  }catch{}
  if(lat){
    // Climate normals
    try{
      const cstn=nearestOf(CLIMATE_STNS,lat,lng);
      const[maxR,minR,avgR]=await Promise.all([
        fetch(`${HKO_C}?dataType=CLMMAXT&lang=tc&station=${cstn.code}&year=${y}&month=${moStr}`).then(r=>r.json()).catch(()=>null),
        fetch(`${HKO_C}?dataType=CLMMINT&lang=tc&station=${cstn.code}&year=${y}&month=${moStr}`).then(r=>r.json()).catch(()=>null),
        fetch(`${HKO_C}?dataType=CLMTEMP&lang=tc&station=${cstn.code}&year=${y}&month=${moStr}`).then(r=>r.json()).catch(()=>null),
      ]);
      const getClim=obj=>{if(!obj)return null;const arr=obj.data||[];if(!arr.length)return null;return num(arr[arr.length-1]?.value??arr[0]?.value);};
      const cmax=getClim(maxR),cmin=getClim(minR),cavg=getClim(avgR);
      if(cmax!=null||cmin!=null){wxDetails.climMax=cmax;wxDetails.climMin=cmin;wxDetails.climAvg=cavg;wxDetails.climStn=cstn.n}
    }catch(e){console.warn('[clim]',e)}
    // Tide — opendata.php CSV: Month,Date,HHMM,Height(m),H/L (one event per row)
    wxDetails.tideLoaded=false;
    try{
      const tstn=nearestOf(TIDE_STNS,lat,lng);
      const csv=await fetch(`https://data.weather.gov.hk/weatherAPI/opendata/opendata.php?dataType=HLT&station=${tstn.code}&year=${y}&month=${moStr}&rformat=csv`,{signal:AbortSignal.timeout(8000)}).then(r=>r.text());
      const lines=csv.split('\n').map(l=>l.trim()).filter(l=>l&&!/^[#A-Za-z]/i.test(l));
      const today=[];
      for(const line of lines){
        const cols=line.split(',').map(s=>s.trim());
        if(cols.length<4)continue;
        // Format: Month,Date,HHMM,Height[,H/L]  OR  Date,HHMM,Height[,H/L] (no month col)
        let mo_col,d_col,t_col,h_col,type_col;
        if(cols.length>=5&&!isNaN(parseInt(cols[0]))&&!isNaN(parseInt(cols[1]))){
          [mo_col,d_col,t_col,h_col,type_col]=[0,1,2,3,4];
        }else if(cols.length>=4&&!isNaN(parseInt(cols[0]))&&!isNaN(parseInt(cols[1]))){
          [d_col,t_col,h_col,type_col]=[0,1,2,3];mo_col=null;
        }else continue;
        const rowMo=mo_col!=null?parseInt(cols[mo_col]):mo;
        const rowD=parseInt(cols[d_col]);
        if(rowMo!==mo||rowD!==d)continue;
        const t=String(cols[t_col]||'').padStart(4,'0');
        const h=parseFloat(cols[h_col]);
        if(isNaN(h))continue;
        today.push({time:`${t.slice(0,2)}:${t.slice(2,4)}`,height:h,type:(cols[type_col]||'').toUpperCase()});
      }
      wxDetails.tideLoaded=true;
      if(today.length){wxDetails.tide=today;wxDetails.tideStn=tstn.n;}
      else{wxDetails.tide=[];wxDetails.tideStn=tstn.n;}
    }catch(e){console.warn('[tide]',e);wxDetails.tideLoaded=true;wxDetails.tide=[];}
    // Radiation
    try{
      const cstn=nearestOf(CLIMATE_STNS,lat,lng);
      let rdata=null;
      for(const[yr,mn]of[[y,mo],[y,mo===1?12:mo-1]]){
        try{rdata=await fetch(`${HKO_C}?dataType=RYES&lang=tc&station=${cstn.code}&year=${yr}&month=${String(mn).padStart(2,'0')}`).then(r=>r.json());if(rdata?.data?.length)break;}catch{}rdata=null;
      }
      if(rdata?.data?.length){const latest=rdata.data[rdata.data.length-1];const rv=num(latest?.value??latest?.radiation);if(rv!=null){wxDetails.radiation=rv;wxDetails.radiationStn=cstn.n}}
    }catch(e){console.warn('[radiation]',e)}
    // Sunrise / Sunset — HKO opendata.php SRS CSV (data.gov.hk official source)
    // Format: Month,Day,Sunrise(HHMM),SunTransit(HHMM),Sunset(HHMM)
    try{
      // Try with month first (smaller file), fallback to full year
      let csv='';
      for(const url of[
        `https://data.weather.gov.hk/weatherAPI/opendata/opendata.php?dataType=SRS&year=${y}&month=${moStr}&rformat=csv`,
        `https://data.weather.gov.hk/weatherAPI/opendata/opendata.php?dataType=SRS&year=${y}&rformat=csv`,
      ]){
        try{csv=await fetch(url,{signal:AbortSignal.timeout(6000)}).then(r=>r.text());if(csv&&csv.length>20)break;}catch{}
      }
      const lines=csv.split('\n').map(l=>l.trim()).filter(l=>l&&!/^[#A-Za-z]/i.test(l));
      for(const line of lines){
        const cols=line.split(',').map(s=>s.trim());
        if(cols.length<4)continue;
        // Format A: Month,Day,Sunrise,Transit,Sunset (5 cols)
        // Format B: Day,Sunrise,Transit,Sunset (4 cols, month param used)
        let rowMo,rowD,riseIdx,setIdx;
        if(cols.length>=5&&!isNaN(parseInt(cols[0]))&&!isNaN(parseInt(cols[1]))){
          rowMo=parseInt(cols[0]);rowD=parseInt(cols[1]);riseIdx=2;setIdx=4;
        }else if(cols.length>=4&&!isNaN(parseInt(cols[0]))){
          rowMo=mo;rowD=parseInt(cols[0]);riseIdx=1;setIdx=3;
        }else continue;
        if(rowMo!==mo||rowD!==d)continue;
        const toHHMM=v=>{const s=String(v||'').trim().padStart(4,'0');return`${s.slice(0,2)}:${s.slice(2,4)}`;};
        const rise=toHHMM(cols[riseIdx]),set=toHHMM(cols[setIdx]);
        if(rise!=='00:00'&&set!=='00:00'){wxDetails.sunrise=rise;wxDetails.sunset=set;}
        break;
      }
    }catch(e){console.warn('[sun]',e)}
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  TRAFFIC V2: 運輸署特別交通消息第二代 (TD Special Traffic News v2)
//  Data spec: http://static.data.gov.hk/td/special-traffic-news/en/Data_Specification_for_STN_Eng_v4.0.pdf
//  Fields: INCIDENT_NUMBER, INCIDENT_HEADING_CN, INCIDENT_DETAIL_CN,
//          LOCATION_CN, DISTRICT_CN, DIRECTION_CN, ANNOUNCEMENT_DATE,
//          INCIDENT_STATUS_CN (最新情況/更新情況/完結), CONTENT_CN,
//          NEAR_LANDMARK_CN, ID, LATITUDE, LONGITUDE
// ─────────────────────────────────────────────────────────────────────────────

let trafficV2Data  = [];   // parsed TD v2 items
let trafficRthkData = [];  // RTHK items (RSS)
let currentTrafficCat = 'all';
let _trafficAutoCountdown = 0, _trafficAutoTimer = null;
const TRAFFIC_AUTO_INTERVAL_SEC = 2 * 60; // 2-min refresh

// ── XML parser — handles BOTH XML schemas from TD ────────────────────────────
// Schema A (resource.data.one.gov.hk): msgID, ChinText, CurrentStatus (number), ReferenceDate
// Schema B (td.gov.hk/trafficnews.xml): INCIDENT_NUMBER, INCIDENT_HEADING_CN, CONTENT_CN, INCIDENT_STATUS_CN
function parseTDTrafficV2XML(xmlText) {
  if (!xmlText || xmlText.length < 100) return null;
  try {
    const clean = xmlText.replace(/^\uFEFF/, '').trim();
    const xml = new DOMParser().parseFromString(clean, 'text/xml');
    if (xml.querySelector('parseerror') || xml.querySelector('parsererror')) return null;

    // Use getElementsByTagName — works regardless of namespace
    const messages = [...(xml.getElementsByTagName('message').length
      ? xml.getElementsByTagName('message')
      : xml.getElementsByTagName('Message'))];
    if (!messages.length) return null;

    const gText = (el, ...tags) => {
      for (const tag of tags) {
        // Try with and without namespace
        const found = el.getElementsByTagName(tag)[0];
        if (found) return (found.textContent || '').replace(/<!\[CDATA\[|\]\]>/g, '').trim();
      }
      return '';
    };

    return messages.map(m => {
      // ── Schema A: resource.data.one.gov.hk ──
      const msgId    = gText(m, 'msgID', 'MSGID');
      const chinText = gText(m, 'ChinText', 'CHINTEXT');
      const chinShort= gText(m, 'ChinShort', 'CHINSHORT');
      const engText  = gText(m, 'EngText', 'ENGTEXT');
      const refDate  = gText(m, 'ReferenceDate', 'REFERENCEDATE');
      const statusNum= parseInt(gText(m, 'CurrentStatus', 'CURRENTSTATUS') || '0');
      const districts= [...m.getElementsByTagName('District')].map(d => d.textContent.trim()).filter(Boolean);

      // ── Schema B: td.gov.hk (v2 spec) ──
      const incNo    = gText(m, 'INCIDENT_NUMBER', 'ID');
      const headCN   = gText(m, 'INCIDENT_HEADING_CN');
      const detailCN = gText(m, 'INCIDENT_DETAIL_CN');
      const locCN    = gText(m, 'LOCATION_CN');
      const dirCN    = gText(m, 'DIRECTION_CN');
      const distCN   = gText(m, 'DISTRICT_CN');
      const statusCN = gText(m, 'INCIDENT_STATUS_CN');
      const contentCN= gText(m, 'CONTENT_CN');
      const annDate  = gText(m, 'ANNOUNCEMENT_DATE');
      const nearLM   = gText(m, 'NEAR_LANDMARK_CN');

      // Detect which schema
      const isSchemaA = !!chinText || !!msgId;

      if (isSchemaA) {
        // Map CurrentStatus number to status text
        // 1=最新情況, 2=更新情況, 3=完結  (inferred from data)
        // Also check content text for "已解封"/"已恢復" keywords
        const isResolved = /現已解封|現已重開|現已開放|已恢復正常|已解除|已撤銷/u.test(chinText);
        let derivedStatus;
        if (statusNum === 1) derivedStatus = '最新情況';
        else if (statusNum === 2) derivedStatus = isResolved ? '完結' : '更新情況';
        else derivedStatus = isResolved ? '完結' : '更新情況';

        // Derive incident type from content
        const typeText = chinText;

        return {
          _src: 'td_v2',
          id: msgId || String(Math.random()),
          headingCN: chinShort || chinText.split('\n')[0].slice(0, 60),
          detailCN: typeText,  // used for category classification
          contentCN: chinText,
          locationCN: '',
          directionCN: '',
          districtCN: districts.join('、'),
          statusCN: derivedStatus,
          nearLandmarkCN: '',
          announcementDate: refDate,
          lat: null, lng: null,
        };
      } else {
        // Schema B (v2 spec)
        return {
          _src: 'td_v2',
          id: incNo || gText(m, 'ID'),
          headingCN: headCN,
          detailCN: detailCN,
          contentCN: contentCN,
          locationCN: locCN,
          directionCN: dirCN,
          districtCN: distCN,
          statusCN: statusCN,
          nearLandmarkCN: nearLM,
          announcementDate: annDate,
          lat: parseFloat(gText(m, 'LATITUDE')) || null,
          lng: parseFloat(gText(m, 'LONGITUDE')) || null,
        };
      }
    }).filter(i => i.headingCN || i.contentCN);
  } catch(e) { console.warn('[td-v2-xml]', e); return null; }
}

// ── Classify incident into category ──────────────────────────────────────────
function getTrafficCat(item) {
  if (item._src !== 'td_v2') return 'rthk';
  // Use all available text fields for keyword matching
  const text = [item.detailCN, item.headingCN, item.contentCN, item.locationCN].join(' ');
  if (/交通意外|車禍|碰撞|車輛相撞/.test(text)) return 'accident';
  if (/車輛故障|道路工程|道路維修|緊急維修|水管|管道|工程|挖掘|高空墮物|封路|管制/.test(text)) return 'works';
  if (/巴士|小巴|公共交通|鐵路|港鐵|輕鐵|電車|渡輪|高速鐵路|運輸|服務|班次|列車|車次/.test(text)) return 'transit';
  return 'other';
}

// ── Fetch TD v2 XML (try multiple endpoints) ─────────────────────────────────
async function fetchTDV2XML() {
  const urls = [
    // data.one.gov.hk CORS:* direct endpoints
    'https://resource.data.one.gov.hk/td/tc/specialtrafficnews.xml',
    'https://resource.data.one.gov.hk/td/en/specialtrafficnews.xml',
    // www.td.gov.hk structured XML (may need proxy)
    'https://www.td.gov.hk/tc/special_news/trafficnews.xml',
  ];
  const proxyPrefixes = [
    (u) => `https://corsproxy.io/?url=${encodeURIComponent(u)}`,
    (u) => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
    (u) => `https://api.codetabs.com/v1/proxy?quest=${u}`,
  ];

  // Try direct first
  for (const url of urls) {
    try {
      const r = await Promise.race([
        fetch(url, {mode:'cors'}),
        new Promise((_,rej) => setTimeout(() => rej(new Error('timeout')), 6000)),
      ]);
      if (r.ok) {
        const text = await r.text();
        const items = parseTDTrafficV2XML(text);
        if (items?.length) {
          console.log('[td-v2] direct ok:', url, items.length);
          return items;
        }
      }
    } catch(e) { /* try next */ }
  }

  // Try via proxies for the td.gov.hk URL
  const tdUrl = 'https://www.td.gov.hk/tc/special_news/trafficnews.xml';
  for (const mkUrl of proxyPrefixes) {
    try {
      const r = await Promise.race([
        fetch(mkUrl(tdUrl)),
        new Promise((_,rej) => setTimeout(() => rej(new Error('timeout')), 8000)),
      ]);
      if (!r.ok) continue;
      let text = await r.text();
      // allorigins /get returns JSON wrapper
      if (text.startsWith('{')) {
        try { const j = JSON.parse(text); text = j.contents || j.body || text; } catch {}
      }
      const items = parseTDTrafficV2XML(text);
      if (items?.length) {
        console.log('[td-v2] proxy ok:', mkUrl(tdUrl).slice(0,40), items.length);
        return items;
      }
    } catch(e) { /* try next */ }
  }

  // Final fallback: try old RSS
  try {
    const rssUrl = 'https://www.td.gov.hk/tc/special_news/spnews_rss.xml';
    const items = await fetchFeed(rssUrl);
    if (items?.length) {
      console.log('[td-v2] rss fallback ok:', items.length);
      // Convert RSS items to minimal v2 format
      return items.map(i => ({
        _src: 'td_v2',
        id: i.link || String(Math.random()),
        headingCN: i.title || '',
        detailCN: '',
        locationCN: '',
        directionCN: '',
        districtCN: '',
        statusCN: '最新情況',
        contentCN: i.description || '',
        nearLandmarkCN: '',
        announcementDate: i.pubDate || '',
        lat: null, lng: null,
        _rss: true,
      }));
    }
  } catch(e) {}

  return null;
}

// ── Time formatter — handles both Schema A and B date formats ────────────────
function fmtTrafficTime(dateStr) {
  if (!dateStr) return '';
  // Schema A format: "2026/3/20 下午 01:55:17" or " 2026/3/20 下午 01:55:17"
  const schemaA = dateStr.trim().match(/(\d{4})\/(\d+)\/(\d+)\s*(上午|下午)?\s*(\d+):(\d+)/);
  if (schemaA) {
    const [,y,mo,d,ampm,h,min] = schemaA;
    let hour = parseInt(h);
    if (ampm === '下午' && hour < 12) hour += 12;
    if (ampm === '上午' && hour === 12) hour = 0;
    const dt = new Date(parseInt(y), parseInt(mo)-1, parseInt(d), hour, parseInt(min));
    const diff = Math.round((Date.now() - dt.getTime()) / 60000);
    if (diff < 1) return '剛才';
    if (diff < 60) return diff + '分前';
    if (diff < 1440) return `${hour}:${String(parseInt(min)).padStart(2,'0')}`;
    return `${mo}/${d}`;
  }
  // Schema B / ISO format
  const dt = new Date(dateStr);
  if (isNaN(dt)) return '';
  const diff = Math.round((Date.now() - dt.getTime()) / 60000);
  if (diff < 1) return '剛才';
  if (diff < 60) return diff + '分前';
  if (diff < 1440) return `${dt.getHours()}:${String(dt.getMinutes()).padStart(2,'0')}`;
  return `${dt.getMonth()+1}/${dt.getDate()}`;
}

// ── Card renderer for v2 TD items ────────────────────────────────────────────
function renderTDV2Card(item, idx) {
  const cat = getTrafficCat(item);
  const statusRaw = item.statusCN || '';
  let statusClass = 'st-new', statusLabel = '🆕 最新', cardClass = 'tc-new';
  if (statusRaw.includes('更新') || statusRaw === 'UPDATED') { statusClass='st-updated'; statusLabel='🔄 更新'; cardClass='tc-updated'; }
  else if (statusRaw.includes('完結') || statusRaw === 'CLOSED') { statusClass='st-closed'; statusLabel='✅ 完結'; cardClass='tc-closed'; }

  const typeLabel = {accident:'🚗 交通意外', works:'🚧 道路/工程', transit:'🚌 公共交通', other:'📋 其他'}[cat] || '📋 其他';
  const typeClass = {accident:'', works:'tc-t-works', transit:'tc-t-transit', other:'tc-t-other'}[cat] || 'tc-t-other';

  // Schema A: headingCN = first line of ChinShort, contentCN = full ChinText
  // Schema B: headingCN = INCIDENT_HEADING_CN, contentCN = CONTENT_CN
  const heading = item.headingCN || item.contentCN?.split('\n')[0]?.slice(0,80) || '特別交通消息';
  const content = (item.contentCN || '').trim().replace(/\r\n|\r/g, '\n');
  // Only show content if it meaningfully differs from heading
  const showContent = content && content !== heading && content.length > heading.length;

  const loc = [item.locationCN, item.directionCN && '往'+item.directionCN, item.nearLandmarkCN && '近'+item.nearLandmarkCN].filter(Boolean).join('　');
  const timeStr = fmtTrafficTime(item.announcementDate);
  const contentId = `tc-content-${idx}`;
  const btnId = `tc-btn-${idx}`;
  const hasLong = content.length > 100;

  return `<div class="tc-card ${cardClass}" style="animation-delay:${idx*.025}s">
    <div class="tc-inner">
      <div class="tc-hdr">
        <span class="tc-type-badge ${typeClass}">${typeLabel}</span>
        <span class="tc-status-badge ${statusClass}">${statusLabel}</span>
        ${timeStr ? `<span class="tc-time">${timeStr}</span>` : ''}
      </div>
      <div class="tc-heading">${heading}</div>
      ${loc ? `<div class="tc-location">📍 ${loc}</div>` : ''}
      ${showContent ? `<div class="tc-content" id="${contentId}">${content}</div>` : ''}
      <div class="tc-footer">
        ${item.districtCN ? `<span class="tc-district">${item.districtCN}</span>` : ''}
        ${showContent && hasLong ? `<button class="tc-expand-btn" id="${btnId}" onclick="toggleTcContent('${contentId}','${btnId}')">展開 ▾</button>` : ''}
      </div>
    </div>
  </div>`;
}

// ── Main render ──────────────────────────────────────────────────────────────
function renderTrafficV2() {
  const el = document.getElementById('traffic-list');
  if (!el) return;
  const cat = currentTrafficCat;

  // Filter TD v2 items
  let tdItems = trafficV2Data;
  if (cat === 'accident') tdItems = tdItems.filter(i => getTrafficCat(i) === 'accident');
  else if (cat === 'works') tdItems = tdItems.filter(i => getTrafficCat(i) === 'works');
  else if (cat === 'transit') tdItems = tdItems.filter(i => getTrafficCat(i) === 'transit');
  else if (cat === 'new') tdItems = tdItems.filter(i => !(i.statusCN||'').includes('完結'));
  else if (cat === 'closed') tdItems = tdItems.filter(i => (i.statusCN||'').includes('完結'));
  else if (cat === 'rthk') { tdItems = []; }

  // Sort: NEW first, then UPDATED, then CLOSED; within group: newest first
  const statusOrder = (s) => s.includes('完結') ? 2 : s.includes('更新') ? 1 : 0;
  const timeSafe = s => { try { return new Date(s).getTime() || 0 } catch { return 0 } };
  tdItems = [...tdItems].sort((a,b) => {
    const so = statusOrder(a.statusCN||'') - statusOrder(b.statusCN||'');
    if (so !== 0) return so;
    return timeSafe(b.announcementDate) - timeSafe(a.announcementDate);
  });

  // Show RTHK only in "all" or "rthk" tab
  const rthkItems = (cat === 'all' || cat === 'rthk') ? trafficRthkData : [];

  const total = tdItems.length + rthkItems.length;

  // Update tab count badges
  if (cat === 'all') {
    const newCount = trafficV2Data.filter(i => !(i.statusCN||'').includes('完結')).length;
    const countEl = document.getElementById('ttab-all');
    if (countEl) countEl.innerHTML = newCount > 0
      ? `📋 全部<span class="tc-count-badge">${newCount}</span>`
      : '📋 全部';
  }

  if (!total && !trafficV2Data.length && !trafficRthkData.length) {
    // Still loading
    return;
  }

  if (!total) {
    const labels = {accident:'交通意外',works:'道路工程',transit:'公共交通',new:'最新/更新',closed:'完結',rthk:'RTHK交通'};
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🚦</div>
      <div class="empty-text">目前沒有「${labels[cat]||''}」消息</div>
      <div class="empty-sub">交通暢順，繼續留意最新消息</div>
    </div>`;
    return;
  }

  // Render section headers when showing all
  let html = '';
  if (cat === 'all' && tdItems.length && rthkItems.length) {
    html += `<div style="font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);font-family:var(--mono);margin:4px 2px 8px">🚦 運輸署特別交通消息</div>`;
  }
  html += tdItems.map((item, i) => renderTDV2Card(item, i)).join('');

  if (rthkItems.length) {
    if (cat === 'all' && tdItems.length) {
      html += `<div style="font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);font-family:var(--mono);margin:12px 2px 8px">📻 RTHK 交通廣播</div>`;
    }
    html += rthkItems.map((item, i) => renderRthkCard(item, tdItems.length + i)).join('');
  }

  if (!html) {
    el.innerHTML = `<div style="text-align:center;padding:30px 20px;color:var(--mid)">
      <div style="font-size:32px;margin-bottom:12px">🚦</div>
      <div style="font-size:14px">無法載入交通消息</div>
      <div style="font-size:12px;color:var(--dim);margin-top:6px;line-height:1.7">請檢查網絡連線後重試</div>
      <button onclick="reloadTrafficV2()" style="margin-top:14px;background:var(--bg3);border:1px solid var(--bdr2);color:var(--txt);border-radius:9px;padding:9px 20px;font-size:13px;cursor:pointer;font-family:var(--sans)">↺ 重試</button>
    </div>`;
    return;
  }
  el.innerHTML = html;
}

const CACHE_TTL=10*60*1000; // 10 minutes

function cacheValid(key, store){
  const e=store[key];
  if(!e||!e.ts)return false;
  if(e._failed)return(Date.now()-e.ts<2*60*1000); // failed → retry after 2min
  return(Date.now()-e.ts<CACHE_TTL)&&e.items?.length;
}

async function ft(url,ms=5000){
  return new Promise((res,rej)=>{
    const t=setTimeout(()=>rej(new Error('timeout')),ms);
    fetch(url).then(r=>{clearTimeout(t);res(r)}).catch(e=>{clearTimeout(t);rej(e)});
  });
}

function parseXML(text){
  if(!text||text.length<80)return null;
  try{
    // Strip BOM, XML declaration, and common encoding declarations
    const clean=text
      .replace(/^\uFEFF/,'')
      .replace(/<\?xml[^>]*\?>/g,'')
      .replace(/encoding="[^"]*"/gi,'encoding="UTF-8"')
      .trim();
    const xml=new DOMParser().parseFromString(clean,'text/xml');
    // Check for parse error (Firefox uses <parsererror>, Chrome uses <parsererror xmlns=...>)
    const pe=xml.querySelector('parsererror,parsererror\\:parsererror');
    if(pe)return null;
    const items=[...xml.querySelectorAll('item,entry')];
    if(!items.length)return null;
    return items.slice(0,80).map(item=>{
      // Helper: get text content, stripping CDATA markers and HTML tags
      const gs=t=>{
        const el=item.querySelector(t);
        if(!el)return'';
        return(el.textContent||el.innerHTML||'')
          .replace(/<!\[CDATA\[|\]\]>/g,'')
          .replace(/<[^>]+>/g,' ')
          .replace(/\s+/g,' ')
          .trim();
      };
      // Link: try <link>, then href attribute, then <guid>
      const linkEl=item.querySelector('link');
      const link=linkEl?.textContent?.trim()||
                 linkEl?.getAttribute('href')||
                 item.querySelector('guid')?.textContent?.trim()||'';
      const desc=(gs('description')||gs('summary')||gs('content')).slice(0,280);
      return{
        title:gs('title'),
        link,
        description:desc,
        pubDate:gs('pubDate')||gs('published')||gs('updated')||gs('dc\\:date'),
      };
    }).filter(i=>i.title&&i.title.length>1);
  }catch(e){return null}
}

// Fetch one proxy and return parsed items, or throw
async function _tryProxy(label, fetchPromise, isJson){
  const res = await fetchPromise;
  if(isJson){
    const j = await res.json();
    // allorigins /get wrapper
    if(j?.status?.http_code===200 && j.contents?.length>100){
      const items=parseXML(j.contents);
      if(items?.length){console.log(`[feed-${label}] ok:`,items.length);return items;}
    }
    // rss2json format
    if(j.status==='ok' && j.items?.length>0){
      console.log(`[feed-${label}] rss2json ok:`,j.items.length);
      return j.items.map(i=>({
        title:(i.title||'').replace(/<[^>]+>/g,'').trim(),
        link:i.link||i.guid||'',
        pubDate:i.pubDate||'',
        description:(i.description||i.content||'').replace(/<[^>]+>/g,'').trim().slice(0,240),
      })).filter(i=>i.title);
    }
    throw new Error('json-empty');
  }
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  const text = await res.text();
  const items = parseXML(text);
  if(!items?.length) throw new Error('no-items');
  console.log(`[feed-${label}] ok:`,items.length);
  return items;
}

async function fetchFeed(url){
  const enc=encodeURIComponent(url);
  const SIG=AbortSignal.timeout?AbortSignal.timeout(12000):undefined;
  const opt=SIG?{signal:SIG}:{};

  // Build list of concurrent attempts
  const attempts=[
    // rss2json – great for standard RSS
    _tryProxy('rss2json',
      fetch(`https://api.rss2json.com/v1/api.json?rss_url=${enc}&count=60`,opt),true),
    // allorigins /get – JSON wrapper
    _tryProxy('ao-get',
      fetch(`https://api.allorigins.win/get?url=${enc}`,opt),true),
    // corsproxy.io – raw XML
    _tryProxy('corsproxy',
      fetch(`https://corsproxy.io/?url=${enc}`,opt),false),
    // allorigins /raw – raw XML
    _tryProxy('ao-raw',
      fetch(`https://api.allorigins.win/raw?url=${enc}`,opt),false),
    // codetabs – raw XML
    _tryProxy('codetabs',
      fetch(`https://api.codetabs.com/v1/proxy?quest=${url}`,opt),false),
    // htmldriven cors proxy
    _tryProxy('htmldriven',
      fetch(`https://cors-proxy.htmldriven.com/?url=${enc}`,opt),false),
    // thingproxy
    _tryProxy('thingproxy',
      fetch(`https://thingproxy.freeboard.io/fetch/${url}`,opt),false),
    // direct fetch (works if site has CORS *)
    _tryProxy('direct',
      fetch(url,{...opt,mode:'cors'}),false),
  ];

  // Race: return first successful result
  return new Promise(resolve=>{
    let done=false, remaining=attempts.length;
    attempts.forEach(p=>p.then(items=>{
      if(!done&&items?.length){done=true;resolve(items);}
    }).catch(()=>{}).finally(()=>{
      remaining--;
      if(remaining===0&&!done){
        console.warn('[feed] ALL proxies failed for',url);
        resolve(null);
      }
    }));
    // Hard 18s timeout
    setTimeout(()=>{if(!done){done=true;resolve(null);}},18000);
  });
}

async function loadNewsFeed(key){
  if(key==='all'){
    await Promise.all(NEWS_FEED_KEYS.map(k=>loadNewsFeed(k)));
    return;
  }
  const items=await fetchFeed(NEWS_FEEDS[key].url);
  if(items){
    newsCache[key]={items:items.map(i=>({...i,_src:key})),ts:Date.now()};
  }else{
    newsCache[key]={items:[],ts:Date.now(),_failed:true};
  }
}

async function ensureNewsFeedLoaded(key){
  if(key==='all'){
    const missing=NEWS_FEED_KEYS.filter(k=>!cacheValid(k,newsCache));
    if(missing.length){
      // Progressive: render as each source completes
      missing.forEach(k=>{
        loadNewsFeed(k).then(()=>{if(currentNewsFeed==='all')renderNewsFeed()});
      });
      // If nothing at all loaded yet, show spinner briefly then wait
      const hasAny=NEWS_FEED_KEYS.some(k=>newsCache[k]?.items?.length);
      if(!hasAny)return; // spinner stays until first .then fires
    }
  }else{
    if(!cacheValid(key,newsCache))await loadNewsFeed(key);
  }
  renderNewsFeed();
}

function getMergedNews(){
  const all=[];
  NEWS_FEED_KEYS.forEach(k=>{(newsCache[k]?.items||[]).forEach(i=>all.push(i))});
  return all.sort((a,b)=>{
    const ta=a.pubDate?new Date(a.pubDate).getTime():0;
    const tb=b.pubDate?new Date(b.pubDate).getTime():0;
    return tb-ta;
  });
}

function renderNewsFeed(){
  const el=document.getElementById('news-list');
  if(!el)return;
  const key=currentNewsFeed;
  if(key==='all'){
    const items=getMergedNews();
    if(!items.length&&NEWS_FEED_KEYS.some(k=>!newsCache[k])){
      el.innerHTML=`<div class="spinner"></div>`;return;
    }
    renderFeedItems(items,el,key,true);
  }else{
    if(!newsCache[key]){el.innerHTML=`<div class="spinner"></div>`;return}
    renderFeedItems(newsCache[key].items,el,key,false);
  }
}

async function reloadNewsFeed(){

  document.getElementById('news-list').innerHTML=`<div class="spinner"></div>`;

function setDist(m){nearbyDist=m;localStorage.setItem('nearby_dist',m);document.querySelectorAll('.dist-pill').forEach(p=>p.classList.toggle('active',parseInt(p.dataset.m)===m));loadNearby()}
function syncDistPills(){
  const stdVals=[100,300,500,1000,3000,5000];
  const isStd=stdVals.includes(nearbyDist);
  document.querySelectorAll('.dist-pill[data-m]').forEach(p=>p.classList.toggle('active',parseInt(p.dataset.m)===nearbyDist));
  const cp=document.getElementById('dist-custom-pill');
  if(cp)cp.classList.toggle('active',!isStd);
  // Update custom-pill text to show current custom value
  if(cp&&!isStd)cp.textContent=_distLabel(nearbyDist);
  else if(cp)cp.textContent='自訂';
}
// Custom distance — shown as overlay panel with range slider
const _DIST_STEPS=[100,200,300,500,750,1000,1500,2000,3000,5000,8000,10000,15000,20000];
function _distLabel(m){return m>=1000?(m/1000)+'km':m+'m';}
function openCustomDist(){
  // Build a fixed overlay panel above the dist-row
  let ov=document.getElementById('dist-slider-ov');
  if(!ov){
    ov=document.createElement('div');ov.id='dist-slider-ov';
    ov.style.cssText='position:fixed;bottom:calc(var(--nav-h) + 8px);left:0;right:0;z-index:40;display:flex;justify-content:center;padding:0 12px';
    ov.innerHTML=`<div style="background:var(--bg2);border:1px solid var(--bdr2);border-radius:14px;padding:14px 16px 12px;width:100%;max-width:480px;box-shadow:0 6px 28px rgba(0,0,0,.6)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <span style="font-size:12px;color:var(--mid)">自訂距離</span>
        <span id="dist-slider-lbl" style="font-family:var(--mono);font-size:18px;font-weight:700;color:var(--amb2)"></span>
      </div>
      <input id="dist-slider-inp" type="range" min="0" max="${_DIST_STEPS.length-1}" step="1"
        style="width:100%;accent-color:var(--amb);height:4px;cursor:pointer;margin-bottom:10px"
        oninput="_distSliderUpdate(this.value)">
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button onclick="_distSliderCancel()" style="background:var(--bg3);border:1px solid var(--bdr2);color:var(--mid);border-radius:8px;padding:7px 16px;font-size:13px;cursor:pointer;font-family:var(--sans)">取消</button>
        <button onclick="_distSliderConfirm()" style="background:var(--amb);color:#000;border:none;border-radius:8px;padding:7px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--sans)">確定</button>
      </div>
    </div>`;
    document.body.appendChild(ov);
  }
  // Set slider to nearest step
  const curIdx=_DIST_STEPS.reduce((best,v,i)=>Math.abs(v-nearbyDist)<Math.abs(_DIST_STEPS[best]-nearbyDist)?i:best,0);
  const inp=document.getElementById('dist-slider-inp');
  if(inp)inp.value=curIdx;
  _distSliderUpdate(curIdx);
  ov.style.display='flex';
}
function _distSliderUpdate(idx){
  const v=_DIST_STEPS[parseInt(idx)];
  const lbl=document.getElementById('dist-slider-lbl');
  if(lbl)lbl.textContent=_distLabel(v);
}
function _distSliderConfirm(){
  const inp=document.getElementById('dist-slider-inp');
  if(inp){const v=_DIST_STEPS[parseInt(inp.value)];setDist(v);}
  _distSliderClose();
}
function _distSliderCancel(){_distSliderClose();}
function _distSliderClose(){
  const ov=document.getElementById('dist-slider-ov');
  if(ov)ov.style.display='none';
}
// keep old names as stubs for safety
function confirmCustomDist(){_distSliderConfirm();}
function cancelCustomDist(){_distSliderClose();}

function requestGPS(){
  if(!navigator.geolocation)return;
  const el=document.getElementById('bus-list');
  el.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:160px;gap:12px">
    <div class="spinner" style="margin:0"></div>
    <div style="font-size:13px;color:var(--mid)">定位中…</div>
  </div>`;
  if(_gpsInFlight)return; // already in-flight from autoLocate
  _gpsInFlight=true;
  navigator.geolocation.getCurrentPosition(
    pos=>{
      _gpsInFlight=false;
      nearbyLat=pos.coords.latitude;nearbyLng=pos.coords.longitude;
      _savePosCache(nearbyLat,nearbyLng);
      const near=nearestOf(RHRREAD_STNS,nearbyLat,nearbyLng);
      if(near.n!==selectedStn){selectedStn=near.n;localStorage.setItem('hko_stn',near.n);loadWeather();}
      document.getElementById('w-loc-lbl').textContent=selectedStn;
      loadNearby();
    },
    err=>{
      _gpsInFlight=false;
      let msg='❌ 定位失敗';
      if(err.code===1) msg='⚠️ 位置權限被拒絕<br><small style="color:var(--dim)">請到瀏覽器設定中允許位置存取，然後重新整理頁面</small>';
      else if(err.code===2) msg='⚠️ 無法取得位置信號<br><small style="color:var(--dim)">請移至室外或開啟 WiFi 後重試</small>';
      el.innerHTML=`<div class="msg">${msg}</div>`;
    },
    {timeout:15000, maximumAge:60000, enableHighAccuracy:true}
  );
}

// Tab drag
let TD={on:false,idx:-1,to:-1,clone:null,startX:0,tabW:72,cL:0,cT:0};
function tabDragStart(e,idx){const bar=document.getElementById('profiles-bar');const tabs=bar.querySelectorAll('.profile-tab:not(.nearby-tab)');const tab=tabs[idx];if(!tab)return;const r=tab.getBoundingClientRect();TD={on:false,idx,to:idx,clone:null,startX:e.touches[0].clientX,tabW:r.width+6,cL:r.left,cT:r.top};TD._p=()=>{TD.on=true;const cl=tab.cloneNode(true);cl.className='float-clone profile-tab active';cl.style.cssText=`left:${r.left}px;top:${r.top}px;width:${r.width}px;height:${r.height}px`;document.body.appendChild(cl);TD.clone=cl;tab.classList.add('tab-ghost')}}
document.addEventListener('touchmove',e=>{if(TD.idx===-1)return;const dx=e.touches[0].clientX-TD.startX;if(!TD.on&&Math.abs(dx)>6)TD._p?.();if(!TD.on)return;TD.clone.style.left=(TD.cL+dx)+'px';const ni=Math.max(0,Math.min(profiles.length-1,TD.idx+Math.round(dx/TD.tabW)));if(ni!==TD.to){TD.to=ni;document.querySelectorAll('.profile-tab:not(.nearby-tab)').forEach((t,i)=>t.classList.toggle('tab-slot',i===ni&&i!==TD.idx))}},{passive:true});
document.addEventListener('touchend',()=>{if(TD.idx===-1)return;if(TD.on){TD.clone?.remove();document.querySelectorAll('.profile-tab:not(.nearby-tab)').forEach(t=>t.classList.remove('tab-ghost','tab-slot'));const{idx,to}=TD;if(idx!==to){const item=profiles.splice(idx,1)[0];profiles.splice(to,0,item);saveProfiles(profiles);renderProfiles()}}TD={on:false,idx:-1,to:-1,clone:null,startX:0,tabW:72,cL:0,cT:0}});

// fmtEtas kept for legacy call compatibility (not used in v2 cards)
function fmtEtas(etas,cc,now){
  return(etas||[]).slice(0,3).map((ts,i)=>{
    const m=Math.round((ts-now)/60000);const dv=new Date(ts);
    const cls=i===0?`e1 ${cc}`:i===1?'e2':'e3';
    return`<div class="${cls}">${m<=0?'即將':m+'分'}</div>`;
  }).join('');
}

function renderBusCardV2({route,dest,stopName,dist,fare,companyType,etasWithType,idx,dragIdx,clickFn,removeFn}){
  const now=Date.now();
  const validEtas=(etasWithType||[]).filter(e=>e.ts>now-30000).slice(0,3);
  const firstM=validEtas.length?Math.round((validEtas[0].ts-now)/60000):null;
  const urgency=firstM===null?'':firstM<=2?'soon':firstM<=8?'coming':'ok';
  const isCTB=companyType==='ctb',isLRT=companyType==='lrt',isMTR=companyType==='mtr',isJoint=companyType==='joint';
  const coLabel=isJoint?'九巴+城巴':isCTB?'城巴':isLRT?'輕鐵':isMTR?'港鐵':'九巴';
  const badgeBg=isCTB?'rgba(46,213,115,.1)':isLRT?'rgba(255,165,0,.1)':isMTR?'rgba(255,71,87,.12)':'var(--amb-bg)';
  const badgeBdr=isCTB?'rgba(46,213,115,.3)':isLRT?'rgba(255,165,0,.35)':isMTR?'rgba(255,71,87,.35)':'var(--amb-bdr)';
  const routeCol=isCTB?'#2ed573':isLRT?'#ffaa33':isMTR?'#ff8a96':'var(--amb2)';
  let etaHtml='';
  if(!validEtas.length){
    etaHtml=`<div style="font-family:var(--mono);font-size:11px;color:var(--dim)">無班次</div>`;
  }else{
    etaHtml=validEtas.map((e,i)=>{
      const m=Math.round((e.ts-now)/60000);
      const dv=new Date(e.ts);
      const timeStr=`${pad(dv.getHours())}:${pad(dv.getMinutes())}`;
      const minStr=m<=0?'即將':m+'分';
      const mc=m<=2?'sc':m<=8?'cc':'oc';
      const coTag=isJoint?(e.type==='ctb'?'城巴':e.type==='lrt'?'輕':e.type==='mtr'?'港鐵':'九巴'):'';
      return`<div class="bcv2-eta-row${i===0?' e-first':''}">
        ${isJoint?`<span class="bcv2-eta-co">${coTag}</span>`:''}
        <span class="bcv2-eta-time">${timeStr}</span>
        <span class="bcv2-eta-mins ${mc}">${minStr}</span>
      </div>`;
    }).join('');
  }
  const distStr=dist?`${dist}m`:'';
  const fareStr=fare!=null?`($${fare})`:'';
  const stopInfo=stopName+(distStr?` - ${distStr}`:'')+(fareStr?`  ${fareStr}`:'');
  const dragHtml=dragIdx!==undefined?`<div class="bcv2-drag-hdl" ontouchstart="busDragStart(event,${dragIdx})">⠿</div>`:'';
  const rmHtml=removeFn?`<button class="bcv2-rm-btn" onclick="${removeFn}">×</button>`:'';
  const clickAttr=clickFn?`onclick="${clickFn}"`:'';
  return`<div class="bus-card-v2 ${urgency}" data-fare-key="${route}_${companyType}" style="animation-delay:${idx*.04}s" ${clickAttr}>
    ${dragHtml}
    <div class="bcv2-badge" style="background:${badgeBg};border-color:${badgeBdr}">
      <div class="bcv2-route-no" style="color:${routeCol};font-size:${route.length<=3?'24px':route.length===4?'19px':'15px'}">${route}</div>
      <div class="bcv2-co-name">${coLabel}</div>
    </div>
    <div class="bcv2-mid">
      <div class="bcv2-dest-lbl">往 ${dest}</div>
      <div class="bcv2-stop-lbl">${stopInfo}</div>
    </div>
    <div class="bcv2-etas">${etaHtml}</div>
    ${rmHtml}
  </div>`;
}
