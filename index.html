async function fetchAllStops(){
  if(allStops&&allStops.length)return allStops;
  const cached=await _idb.fresh('kmb_stops');
  if(cached&&cached.length){allStops=cached;console.log('[IDB] kmb_stops hit:',cached.length);return allStops;}
  const data=await fetch(`${KMB}/stop`).then(r=>r.json());
  allStops=data.data||[];
  if(allStops.length)_idb.set('kmb_stops',allStops,24*60*60*1000);
  return allStops;
}
// ── CTB nearby raw data helper ─────────────────────────────────────────────
let _ctbStopsPromise=null;
async function _ensureCTBStops(){
  if(window._ctbStops&&window._ctbStops.length>0)return window._ctbStops;
  if(!_ctbStopsPromise){
    _ctbStopsPromise=(async()=>{
      // IDB 快取優先（24hr TTL）
      const cached=await _idb.fresh('ctb_stops');
      if(cached&&cached.length){window._ctbStops=cached;console.log('[IDB] ctb_stops hit:',cached.length);return;}
      try{
        const d=await fetch(`${CTB}/stop`,{signal:AbortSignal.timeout?AbortSignal.timeout(12000):undefined}).then(r=>r.json());
        window._ctbStops=d.data||[];
        if(window._ctbStops.length)_idb.set('ctb_stops',window._ctbStops,24*60*60*1000);
        console.log('[CTB stops]',window._ctbStops.length);
      }catch(e){
        console.warn('[CTB stops] fetch failed:',e);
        window._ctbStops=null;
        _ctbStopsPromise=null;
      }
    })();
  }
  await _ctbStopsPromise;
  return window._ctbStops||[];
}
async function _fetchCTBNearbyRaw(lat,lng,radius){
  const allStops=await _ensureCTBStops();
  if(!allStops.length)return [];
  const nearbyCTB=(window._ctbStops||[])
    .map(s=>({...s,dist:haverDist(lat,lng,parseFloat(s.lat||s.latitude||0),parseFloat(s.long||s.longitude||0))}))
    .filter(s=>s.dist<=radius&&!isNaN(s.dist)&&s.dist>0)
    .sort((a,b)=>a.dist-b.dist).slice(0,8);
  const now=Date.now();const results=[];
  await Promise.all(nearbyCTB.map(async stop=>{
    try{
      const d=await fetch(`${CTB}/eta/CTB/${stop.stop}/all`).then(r=>r.json());
      const seen=new Set();
      (d.data||[]).forEach(e=>{
        if(!e.eta)return;const ts=new Date(e.eta).getTime();
        if(ts<now-30000)return;
        const key=`${e.route}_${e.dir||'O'}`;
        if(!seen.has(key)){
          seen.add(key);
          results.push({route:e.route,dest:e.dest_tc||'',stopName:stop.name_tc||stop.stop,stopId:stop.stop,dist:Math.round(stop.dist),dir:e.dir||'O',etasWithType:[{ts,type:'ctb'}]});
        }else{
          const ex=results.find(r=>r.route===e.route&&r.stopId===stop.stop);
          if(ex&&ex.etasWithType.length<3)ex.etasWithType.push({ts,type:'ctb'});
        }
      });
    }catch{}
  }));
  return results;
}

async function loadNearby(){
  const el=document.getElementById('bus-list');el.innerHTML=`<div class="spinner"></div>`;
  if(!nearbyLat){
    if(!navigator.geolocation){el.innerHTML=`<div class="msg">此裝置不支援定位</div>`;return}

    // ── Check if permission already granted (just waiting for GPS to return) ──
    let permState='prompt';
    try{const ps=await navigator.permissions.query({name:'geolocation'});permState=ps.state;}catch{}

    if(permState==='granted'){
      // Permission granted — GPS is in-flight, show spinner and kick GPS if needed
      el.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:160px;gap:12px">
        <div class="spinner" style="margin:0"></div>
        <div style="font-size:13px;color:var(--mid)">定位中…</div>
      </div>`;
      if(!_gpsInFlight)autoLocate();
      return;
    }

    // Permission not yet asked — show allow button
    el.innerHTML=`<div class="msg" style="padding:30px 20px">
      <div style="font-size:32px;margin-bottom:12px">📍</div>
      <div style="font-size:15px;color:var(--bright);margin-bottom:8px">需要位置權限</div>
      <div style="font-size:13px;line-height:1.7;margin-bottom:16px">為搜尋附近班次，需要使用你的精確位置。<br>瀏覽器只需授權一次。</div>
      <button onclick="requestGPS()" style="background:var(--blu);color:#fff;border:none;border-radius:10px;padding:11px 24px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--sans)">📡 允許位置使用</button>
    </div>`;
    return;
  }
  document.getElementById('bus-hdr-lbl').textContent=`${nearbyDist}米內到站時間`;
  try{
    const stops=await fetchAllStops();
    const nearby=stops.map(s=>({...s,dist:haverDist(nearbyLat,nearbyLng,parseFloat(s.lat),parseFloat(s.long))})).filter(s=>s.dist<=nearbyDist).sort((a,b)=>a.dist-b.dist).slice(0,12);
    if(!nearby.length){el.innerHTML=`<div class="empty-state"><div class="empty-icon">🚌</div><div class="empty-text">附近無九巴站</div><div class="empty-sub">${nearbyDist}米範圍內沒有站點</div></div>`;return}
    const etaResults=await Promise.all(nearby.map(s=>fetch(`${KMB}/stop-eta/${s.stop}`).then(r=>r.json()).catch(()=>({data:[]}))));
    const now=Date.now();
    // routeMap key = route+dir, value = display row data
    const routeMap=new Map();
    etaResults.forEach((res,i)=>{
      const stop=nearby[i];
      (res.data||[]).forEach(e=>{
        if(!e.eta)return;const ts=new Date(e.eta).getTime();
        if(ts<now-30000)return;
        const key=`${e.route}_${e.dir}`;
        if(!routeMap.has(key)){
          routeMap.set(key,{route:e.route,dest:e.dest_tc||'',stopName:stop.name_tc,stopId:stop.stop,dist:Math.round(stop.dist),serviceType:e.service_type||'1',dir:e.dir,companyType:'kmb',etasWithType:[{ts,type:'kmb'}],fare:null});
        }else{
          const ex=routeMap.get(key);
          if(ex.etasWithType.length<3&&!ex.etasWithType.find(x=>x.ts===ts))ex.etasWithType.push({ts,type:'kmb'});
        }
      });
    });
    // CTB
    const ts_s=getTransportSettings();
    if(ts_s.ctb){
      try{
        const ctbRows=await _fetchCTBNearbyRaw(nearbyLat,nearbyLng,nearbyDist);
        ctbRows.forEach(r=>{
          // Try to match with existing KMB entry (joint route)
          const matchKey=routeMap.has(`${r.route}_O`)?`${r.route}_O`:routeMap.has(`${r.route}_I`)?`${r.route}_I`:null;
          if(matchKey){
            const ex=routeMap.get(matchKey);ex.companyType='joint';
            r.etasWithType.forEach(e=>{if(ex.etasWithType.length<3)ex.etasWithType.push(e);});
            ex.etasWithType.sort((a,b)=>a.ts-b.ts);
          }else{
            const newKey=`${r.route}_CTB_${r.stopId}`;
            if(!routeMap.has(newKey)){
              routeMap.set(newKey,{route:r.route,dest:r.dest,stopName:r.stopName,stopId:r.stopId,dist:r.dist,serviceType:'1',dir:'O',companyType:'ctb',etasWithType:r.etasWithType,fare:null});
            }else{
              const ex=routeMap.get(newKey);
              r.etasWithType.forEach(e=>{if(ex.etasWithType.length<3)ex.etasWithType.push(e);});
            }
          }
        });
      }catch(e){console.warn('[CTB nearby v2]',e);}
    }
    // MTR
    if(ts_s.mtr){
      try{
        const mtrRows=await fetchMTRNearby(nearbyLat,nearbyLng);
        mtrRows.forEach((r,i)=>{
          routeMap.set(`MTR_${r.route}_${r.dest}_${i}`,{route:r.route,dest:r.dest,stopName:r.stopName,stopId:r.stopId,dist:r.dist,serviceType:'1',dir:'U',companyType:'mtr',etasWithType:r._etas.map(ts=>({ts,type:'mtr'})),fare:null});
        });
      }catch(e){console.warn('[MTR nearby]',e);}
    }
    // LRT
    if(ts_s.lrt){
      try{
        const lrtRows=await fetchLRTNearby(nearbyLat,nearbyLng,nearbyDist);
        lrtRows.forEach((r,i)=>{
          routeMap.set(`LRT_${r.route}_${r.stopId}_${i}`,{route:r.route,dest:r.dest,stopName:r.stopName,stopId:r.stopId,dist:r.dist,serviceType:'1',dir:'O',companyType:'lrt',etasWithType:r._etas.map(ts=>({ts,type:'lrt'})),fare:null});
        });
      }catch(e){console.warn('[LRT nearby]',e);}
    }
    let rows=[...routeMap.values()].filter(r=>r.etasWithType.length>0);
    rows.sort((a,b)=>a.etasWithType[0].ts-b.etasWithType[0].ts);
    if(!rows.length){el.innerHTML=`<div class="empty-state"><div class="empty-icon">⏱</div><div class="empty-text">暫無班次</div></div>`;return}
    const renderRows=rows.slice(0,25);
    // Pre-fetch fares for all KMB/joint rows, wait up to 4s
    const fareRowsIdx=renderRows.map((r,i)=>({r,i})).filter(({r})=>r.companyType==='kmb'||r.companyType==='joint');
    const fareTimeout=new Promise(res=>setTimeout(res,4000));
    await Promise.race([
      Promise.all(fareRowsIdx.map(({r})=>
        fetchKMBFare(r.route,r.dir,r.serviceType).then(fare=>{r.fare=fare;}).catch(()=>{})
      )),
      fareTimeout
    ]);
    el.innerHTML=renderRows.map((r,i)=>renderBusCardV2({
      ...r,idx:i,
      clickFn:r.companyType!=='mtr'?`openBusDetail('${esc(r.route)}','${r.serviceType}','${esc(r.dest)}','${r.stopId}')`:null,
    })).join('');
    // Any fares that arrived late — update DOM via data-fare-key
    fareRowsIdx.forEach(({r})=>{
      if(r.fare==null)return;
      const card=document.querySelector(`.bus-card-v2[data-fare-key="${r.route}_${r.companyType}"]`);
      if(card){const sl=card.querySelector('.bcv2-stop-lbl');if(sl){const ds=r.dist?` - ${r.dist}m`:'';sl.textContent=r.stopName+ds+`  ($${r.fare})`;}}
    });
  }catch(e){console.warn('[nearby v2]',e);el.innerHTML=`<div class="msg">載入失敗，請重試</div>`}
}

async function fetchOneETA(fav){
  try{
    const data=await fetch(`${KMB}/eta/${fav.stopId}/${fav.route}/${fav.serviceType}`).then(r=>r.json());
    fav._etas=(data.data||[]).filter(e=>e.eta).slice(0,3).map(e=>new Date(e.eta).getTime());
    fav._first=fav._etas[0]??null;fav._err=false;
  }catch{fav._etas=[];fav._first=null;fav._err=true;}
  // Fetch fare (KMB only) — update DOM directly after resolve
  if((fav.type==='kmb'||!fav.type)&&fav._fare==null){
    fetchKMBFare(fav.route,'O',fav.serviceType).then(fare=>{
      if(fare==null)return;
      fav._fare=fare;
      const card=document.querySelector(`.bus-card-v2[data-fare-key="${fav.route}_kmb"]`);
      if(card){const sl=card.querySelector('.bcv2-stop-lbl');if(sl)sl.textContent=fav.stopName+`  ($${fare})`;}
    });
  }
}
async function refreshAllETAs(){if(activePid===NEARBY_PID){loadNearby();return}favs=loadFavs(activePid);if(!favs.length){renderBusList();return}await Promise.all(favs.map(fetchOneETA));renderBusList()}
function renderBusList(){

}
function removeFav(e,i){e.stopPropagation();if(!confirm(`確定移除「${favs[i]?.route} 往 ${favs[i]?.dest}」？`))return;favs.splice(i,1);saveFavs(activePid,favs);renderBusList()}
let BD={on:false,idx:-1,to:-1,clone:null,startY:0,startTop:0,cardH:0};
function busDragStart(e,idx){e.stopPropagation();const card=document.querySelectorAll('.bus-card-v2')[idx];if(!card)return;const rect=card.getBoundingClientRect();BD={on:true,idx,to:idx,startY:e.touches[0].clientY,startTop:rect.top,cardH:rect.height+9,clone:null};const cl=card.cloneNode(true);cl.className='float-clone';cl.style.cssText=`left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;border-radius:12px`;document.body.appendChild(cl);BD.clone=cl;card.classList.add('card-ghost')}
document.addEventListener('touchmove',e=>{if(!BD.on)return;const dy=e.touches[0].clientY-BD.startY;BD.clone.style.top=(BD.startTop+dy)+'px';const ni=Math.max(0,Math.min(favs.length-1,BD.idx+Math.round(dy/BD.cardH)));if(ni!==BD.to){BD.to=ni;document.querySelectorAll('.bus-card-v2').forEach((c,i)=>c.classList.toggle('card-slot',i===ni&&i!==BD.idx))}},{passive:true});
document.addEventListener('touchend',()=>{if(!BD.on)return;BD.clone?.remove();BD.on=false;const{idx,to}=BD;BD.idx=-1;BD.to=-1;if(idx!==to){const item=favs.splice(idx,1)[0];favs.splice(to,0,item);saveFavs(activePid,favs);fetchOneETA(favs[to]).then(renderBusList)}else renderBusList()});

function openSearch(){setDTitle('搜尋路線');document.getElementById('drawer-body').innerHTML=`<div class="search-row"><input class="d-input" id="route-inp" placeholder="路線號碼（如 40X）" maxlength="6" oninput="this.value=this.value.toUpperCase()" onkeydown="if(event.key==='Enter')searchRoute()"><button class="d-btn" onclick="searchRoute()">搜尋</button></div><div id="search-results"></div>`;openOverlay();setTimeout(()=>document.getElementById('route-inp')?.focus(),260)}
async function searchRoute(){const q=(document.getElementById('route-inp')?.value||'').trim().toUpperCase();if(!q)return;const el=document.getElementById('search-results');el.innerHTML=`<div class="spinner"></div>`;try{const data=await fetch(`${KMB}/route/`).then(r=>r.json());const routes=data.data.filter(r=>r.route===q);if(!routes.length){el.innerHTML=`<div class="msg">找不到路線「${q}」</div>`;return}el.innerHTML=`<div class="sec-lbl">選擇方向</div>`+routes.map(r=>`<div class="result-item" onclick="pickRoute('${r.route}','${r.bound}','${r.service_type}','${esc(r.dest_tc)}')"><div class="rn">${r.route}</div><div class="ri"><div class="ri-dest">往 ${r.dest_tc}</div><div class="ri-orig">由 ${r.orig_tc}</div></div><div class="chev">›</div></div>`).join('')}catch{el.innerHTML=`<div class="msg">載入失敗，請重試</div>`}}

async function addFav(stopId,stopName,route,dest,serviceType,type='kmb'){if(!favs.some(f=>f.route===route&&f.stopId===stopId&&f.dest===dest))favs.push({route,stopId,stopName,dest,serviceType,type,_etas:[],_first:null,_err:false});saveFavs(activePid,favs);closeDrawer();await refreshAllETAs()}

let _detailEtaTimer=null;

async function openBusDetail(route,svcType,dest,focusStopId){
  setDTitle(`${route} 路線詳情`);

async function _showRouteDetail(route,routes,svcType,dest,focusStopId,dirIdx){
  const r=routes[dirIdx]||routes[0];
  const dir=r.bound==='O'?'outbound':'inbound';
  const el=document.getElementById('drawer-body');
  el.innerHTML=`<div class="spinner"></div>`;
  try{
    const[sd,si,etaData]=await Promise.all([
      fetch(`${KMB}/route-stop/${route}/${dir}/${r.service_type}`).then(x=>x.json()),
      allStops?{data:allStops}:fetch(`${KMB}/stop`).then(x=>x.json()),
      focusStopId?fetch(`${KMB}/eta/${focusStopId}/${route}/${r.service_type}`).then(x=>x.json()).catch(()=>({data:[]})):Promise.resolve({data:[]}),
    ]);
    if(!allStops)allStops=si.data;
    const sm={};si.data.forEach(s=>sm[s.stop]=s.name_tc);
    const stops=(sd.data||[]).map(s=>({seq:s.seq,stopId:s.stop,name:sm[s.stop]||s.stop}));
    const now=Date.now();
    const etaMap={};
    (etaData.data||[]).filter(e=>e.eta).forEach(e=>{
      const ts=new Date(e.eta).getTime();
      if(ts<now-30000)return;
      const m=Math.round((ts-now)/60000);
      if(!etaMap[e.eta_seq])etaMap[e.eta_seq]=m;
    });

    window._detailRoutes=routes;
    const dirTabs=routes.map((rr,i)=>`<div class="dir-tab${i===dirIdx?' active':''}" onclick="_showRouteDetail('${esc(route)}',window._detailRoutes,null,'${esc(rr.dest_tc)}',null,${i})">往 ${rr.dest_tc}</div>`).join('');
    const stopHtml=stops.map((s,i)=>{
      const isFocus=s.stopId===focusStopId;
      const isFirst=i===0,isLast=i===stops.length-1;
      const eta=etaMap[i+1];
      const etaStr=eta!=null?(eta<=0?'即將':(eta<=2?`<span class="rsl-eta soon">${eta}分</span>`:(eta<=8?`<span class="rsl-eta coming">${eta}分</span>`:`<span class="rsl-eta">${eta}分</span>`))):'' ;
      return`<div class="rsl-item${isFocus?' rsl-focus':''}" onclick="_openStopEta('${s.stopId}','${esc(s.name)}','${route}','${esc(r.dest_tc)}','${r.service_type}')">
        <div class="rsl-line"></div>
        <div class="rsl-dot${isFirst?' first':isLast?' last':''}"></div>
        <div class="rsl-seq">${s.seq}</div>
        <div class="rsl-name">${s.name}${isFocus?'<span style="font-size:10px;color:var(--amb2);margin-left:6px">▶ 你的站</span>':''}</div>
        ${etaStr}
      </div>`;
    }).join('');

    el.innerHTML=`
      <div class="route-detail-hdr">
        <div class="route-detail-badge">${route}</div>
        <div class="route-detail-info">
          <div class="route-detail-dest">往 ${r.dest_tc}</div>
          <div class="route-detail-orig">由 ${r.orig_tc} 開出 · ${stops.length} 個站</div>
        </div>
      </div>
      ${routes.length>1?`<div class="dir-tab-row">${dirTabs}</div>`:''}
      <div class="route-stop-list">${stopHtml}</div>`;

    // scroll to focus stop
    if(focusStopId){
      setTimeout(()=>{
        const focusEl=el.querySelector('.rsl-focus');
        if(focusEl){
          const drawerBody=document.getElementById('drawer-body');
          if(drawerBody) drawerBody.scrollTo({top:Math.max(0,focusEl.offsetTop-120),behavior:'smooth'});
          else focusEl.scrollIntoView({block:'center',behavior:'smooth'});
        }
      },320);
    }
  }catch(e){el.innerHTML=`<div class="msg">載入失敗：${e.message}</div>`}
}

async function _openStopEta(stopId,stopName,route,dest,svcType){
  setDTitle(`${stopName}`);
  const el=document.getElementById('drawer-body');
  el.innerHTML=`<button class="back-link" onclick="openBusDetail('${esc(route)}','${svcType}','${esc(dest)}','${stopId}')">‹ 路線圖</button><div class="spinner"></div>`;
  try{
    const data=await fetch(`${KMB}/eta/${stopId}/${route}/${svcType}`).then(r=>r.json());
    const now=Date.now();
    const etas=(data.data||[]).filter(e=>e.eta&&new Date(e.eta).getTime()>now-30000).slice(0,3);
    const etaHtml=etas.length
      ?etas.map(e=>{const m=Math.round((new Date(e.eta).getTime()-now)/60000);const cc=m<=2?'sc':m<=8?'cc':'oc';return`<div style="display:flex;align-items:baseline;gap:10px;padding:12px 0;border-bottom:1px solid var(--bdr)"><div class="e1 ${cc}" style="font-size:32px">${m<=0?'即將':m+'分'}</div><div style="font-size:12px;color:var(--mid)">${new Date(e.eta).getHours()}:${String(new Date(e.eta).getMinutes()).padStart(2,'0')}</div><div style="flex:1;font-size:12px;color:var(--mid);text-align:right">${e.rmk_tc||''}</div></div>`}).join('')
      :`<div style="color:var(--mid);padding:16px 0;text-align:center">現時無班次資料</div>`;
    el.innerHTML=`<button class="back-link" onclick="openBusDetail('${esc(route)}','${svcType}','${esc(dest)}','${stopId}')">‹ 路線圖</button>
      <div style="font-size:15px;font-weight:600;color:var(--bright);margin:8px 0 4px">${route} 往 ${dest}</div>
      <div style="font-size:12px;color:var(--mid);margin-bottom:14px">📍 ${stopName}</div>
      ${etaHtml}
      <button onclick="addFav('${stopId}','${esc(stopName)}','${route}','${esc(dest)}','${svcType}')" style="width:100%;margin-top:16px;background:var(--amb-bg);border:1px solid var(--amb-bdr);color:var(--amb2);border-radius:10px;padding:11px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans)">⭐ 加入我的路線</button>`;
  }catch{el.innerHTML=`<button class="back-link" onclick="openBusDetail('${esc(route)}','${svcType}','${esc(dest)}','${stopId}')">‹ 返回</button><div class="msg">載入失敗</div>`}
}
// make routes accessible for re-render
let _lastRoutes=null;

// ═══════════════════════════════════
//  SEARCH PAGE (full route search)
// ═══════════════════════════════════
let _allRoutes=null;

async function getAllRoutes(){
  if(_allRoutes&&_allRoutes.length)return _allRoutes;
  const cached=await _idb.fresh('kmb_routes');
  if(cached&&cached.length){_allRoutes=cached;console.log('[IDB] kmb_routes hit:',cached.length);return _allRoutes;}
  try{
    const d=await fetch(`${KMB}/route/`).then(r=>r.json());
    if(d.data&&d.data.length){
      _allRoutes=d.data;
      _idb.set('kmb_routes',_allRoutes,24*60*60*1000);
      return _allRoutes;
    }
  }catch(e){console.warn('[getAllRoutes]',e)}
  return _allRoutes||[];
}

function routeCard(route,dirs,badgeColor,borderColor,accentColor,label,clickFn){
  return`<div style="background:var(--bg2);border:1px solid var(--bdr);border-radius:12px;margin-bottom:8px;overflow:hidden">
    <div style="display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--bdr)">
      <div style="font-family:var(--mono);font-size:26px;font-weight:700;color:${accentColor};background:${badgeColor};border:1px solid ${borderColor};border-radius:8px;padding:4px 12px">${route}</div>
      <div style="flex:1">
        ${dirs.map(d=>`<div style="font-size:13px;color:var(--txt)">${d.orig||d.orig_tc||''} → ${d.dest||d.dest_tc||d.dest_en||''}</div>`).join('')}
        ${label?`<div style="font-size:10px;font-weight:700;color:${accentColor};margin-top:2px">${label}</div>`:''}
      </div>
    </div>
    ${dirs.map((d,i)=>`<div onclick="${clickFn(d,i)}" style="display:flex;align-items:center;padding:11px 14px;cursor:pointer;border-bottom:1px solid var(--bdr)" ontouchstart="this.style.background='var(--bg3)'" ontouchend="this.style.background=''">
      <div style="flex:1"><div style="font-size:13px;font-weight:500">往 ${d.dest||d.dest_tc||d.dest_en||''}</div><div style="font-size:11px;color:var(--mid);margin-top:2px">${d.orig||d.orig_tc?'由 '+(d.orig||d.orig_tc):''}</div></div>
      <div style="color:var(--dim);font-size:17px">›</div>
    </div>`).join('')}

}

async function doRouteSearch(){
  const raw=(document.getElementById('search-route-inp')?.value||'').trim();
  const q=raw.toUpperCase();
  const qZh=raw; // keep original for Chinese matching
  if(!raw)return;
  const el=document.getElementById('search-page-results');
  el.innerHTML=`<div class="spinner"></div>`;
  const ts=getTransportSettings();
  const sections=[];

  // ── KMB ──────────────────────────────────────────────────────────────────
  try{
    const all=await getAllRoutes();
    if(!all.length){
      sections.push(`<div style="background:rgba(255,71,87,.08);border:1px solid rgba(255,71,87,.25);border-radius:10px;padding:12px 14px;font-size:13px;color:#ff8a96;margin-bottom:8px">⚠️ 九巴路線資料未能載入，請稍後重試</div>`);
    }
    // 1) 路線號 / 起終點名 匹配
    let kmbMatches=all.filter(r=>
      r.route===q||r.route.startsWith(q)||
      r.dest_tc?.includes(qZh)||r.orig_tc?.includes(qZh)||
      r.dest_en?.toUpperCase().includes(q)||r.orig_en?.toUpperCase().includes(q)
    );
    // 2) 站名匹配（有2字以上中文、且路線名未命中）
    let kmbStnHint='';
    if(qZh.length>=2&&!kmbMatches.length){
      const stops=await fetchAllStops(); // allStops 已快取
      const hitStops=stops.filter(s=>s.name_tc?.includes(qZh)).slice(0,6);
      if(hitStops.length){
        kmbStnHint=`📍 途經「${qZh}」站的九巴路線`;
        const routeSet=new Map();
        await Promise.all(hitStops.map(async stop=>{
          try{
            const d=await fetch(`${KMB}/stop-eta/${stop.stop}`).then(r=>r.json());
            (d.data||[]).forEach(e=>{
              const key=e.route+'_'+e.service_type;
              if(!routeSet.has(key))routeSet.set(key,{route:e.route,service_type:e.service_type});
            });
          }catch{}
        }));
        routeSet.forEach(v=>{
          const rObjs=all.filter(r=>r.route===v.route&&r.service_type===v.service_type);
          rObjs.forEach(r=>{if(!kmbMatches.find(x=>x.route===r.route&&x.bound===r.bound))kmbMatches.push(r)});
        });
      }
    }
    if(kmbMatches.length){
      const grouped={};
      kmbMatches.forEach(r=>{if(!grouped[r.route])grouped[r.route]=[];grouped[r.route].push(r)});
      const kmbHtml=Object.entries(grouped).slice(0,10).map(([route,dirs])=>
        routeCard(route,dirs,'var(--amb-bg)','var(--amb-bdr)','var(--amb2)','九巴 KMB',
          (d)=>`openBusDetail('${esc(d.route)}','${d.service_type}','${esc(d.dest_tc)}',null)`)
      ).join('');
      if(kmbHtml)sections.push(`<div class="srch-section-lbl">🚌 ${kmbStnHint?'九巴 KMB · '+kmbStnHint:'九巴 KMB'}</div>`+kmbHtml);
    }
  }catch(e){console.warn('[KMB search]',e)}

  // ── CTB ──────────────────────────────────────────────────────────────────
  if(ts.ctb){
    try{
      if(!window._ctbRoutes||!window._ctbRoutes.length){
        const cachedCTBR=await _idb.fresh('ctb_routes');
        if(cachedCTBR&&cachedCTBR.length){
          window._ctbRoutes=cachedCTBR;
          console.log('[IDB] ctb_routes hit:',cachedCTBR.length);
        }else{
          try{
            const d=await fetch(`https://rt.data.gov.hk/v2/transport/citybus/route/ctb`).then(r=>r.json());
            if(d.data&&d.data.length){
              window._ctbRoutes=d.data;
              _idb.set('ctb_routes',window._ctbRoutes,24*60*60*1000);
            }
          }catch(e){console.warn('[CTB routes]',e)}
        }
      }
      // 1) 路線號 / 起終點名
      let ctbMatches=window._ctbRoutes.filter(r=>
        r.route===q||r.route.startsWith(q)||
        r.dest_tc?.includes(qZh)||r.orig_tc?.includes(qZh)
      );
      // 2) 站名匹配
      let ctbStnHint='';
      if(qZh.length>=2&&!ctbMatches.length){
        if(!window._ctbStops){
          const d=await fetch(`https://rt.data.gov.hk/v2/transport/citybus/stop`).then(r=>r.json());
          window._ctbStops=d.data||[];
        }
        const hitStops=(window._ctbStops||[]).filter(s=>s.name_tc?.includes(qZh)).slice(0,6);
        if(hitStops.length){
          ctbStnHint=`📍 途經「${qZh}」站的城巴路線`;
          await Promise.all(hitStops.map(async stop=>{
            try{
              const d=await fetch(`https://rt.data.gov.hk/v2/transport/citybus/eta/CTB/${stop.stop}/all`).then(r=>r.json());
              const rNos=new Set((d.data||[]).map(e=>e.route));
              rNos.forEach(rno=>{
                // 城巴 API 無 bound，每條路線只一筆，用 route 去重
                if(!ctbMatches.find(x=>x.route===rno)){
                  const found=window._ctbRoutes.find(r=>r.route===rno);
                  if(found)ctbMatches.push(found);
                }
              });
            }catch{}
          }));
        }
      }
      if(ctbMatches.length){
        // CTB API 無 bound 欄位——每條路線只有一筆記錄
        // 為每條路線合成「去程(O)」和「回程(I)」兩個方向
        const grouped={};
        ctbMatches.forEach(r=>{
          const rno=r.route;
          if(!grouped[rno]){
            grouped[rno]=[
              {route:rno,bound:'O',dest_tc:r.dest_tc||'',orig_tc:r.orig_tc||'',dest_en:r.dest_en||'',orig_en:r.orig_en||''},
              {route:rno,bound:'I',dest_tc:r.orig_tc||'',orig_tc:r.dest_tc||'',dest_en:r.orig_en||'',orig_en:r.dest_en||''},
            ];
          }
        });
        const html=Object.entries(grouped).slice(0,10).map(([route,dirs])=>
          routeCard(route,dirs,'rgba(46,213,115,.1)','rgba(46,213,115,.3)','#2ed573','城巴 CTB',
            (d)=>`openCTBDetail('${esc(d.route)}','${esc(d.bound)}','${esc(d.dest_tc||"")}')`)
        ).join('');
        if(html)sections.push(`<div class="srch-section-lbl">🟢 ${ctbStnHint?'城巴 CTB · '+ctbStnHint:'城巴 CTB'}</div>`+html);
      }
    }catch(e){console.warn('[CTB search]',e)}
  }

  // ── MTR ───────────────────────────────────────────────────────────────────
  if(ts.mtr){
    // 1) 按綫代碼/綫名匹配（如 TWL、荃灣綫、港鐵、MTR）
    const lineMatch=new Map(); // lineCode → lineName
    Object.entries(MTR_LINE).forEach(([code,name])=>{
      if(code===q||code.includes(q)||name.includes(qZh)||q==='MTR'||qZh==='港鐵'||qZh==='地鐵')
        lineMatch.set(code,name);
    });
    // 2) 按站名匹配（如「旺角」→ 荃灣綫+觀塘綫），記錄 {name,code}
    const stnHitLines=new Map(); // lineCode → {n,c}
    if(qZh.length>=2){
      Object.entries(MTR_LINE_STATIONS).forEach(([code,stns])=>{
        const hit=stns.find(s=>s.n.includes(qZh));
        if(hit) stnHitLines.set(code,{n:hit.n,c:hit.c});
      });
    }
    // 合併：站名匹配也加入 lineMatch
    stnHitLines.forEach((_,code)=>lineMatch.set(code,MTR_LINE[code]||code));

    if(lineMatch.size){
      const mtrHtml=`<div class="srch-section-lbl">🔴 港鐵 MTR</div>`+[...lineMatch.entries()].map(([code,name])=>{
        const hit=stnHitLines.get(code);
        const focusArg=hit?`,'${hit.c}'`:'';
        const sub=hit?`包含「${hit.n}」站`:'';
        const dirs=MTR_DIR_LABELS[code]||['上行','下行'];
        const dirs_rows=dirs.map((dname,di)=>`
          <div onclick="openMTRLineDetail('${code}'${focusArg},'${di===0?'up':'down'}')"
            style="display:flex;align-items:center;padding:11px 14px;cursor:pointer;border-bottom:1px solid var(--bdr)"
            ontouchstart="this.style.background='var(--bg3)'" ontouchend="this.style.background=''">
            <div style="flex:1">
              <div style="font-size:13px;font-weight:500;color:var(--txt)">往 ${dname}</div>
              ${sub?`<div style="font-size:11px;color:var(--mid);margin-top:2px">${sub}</div>`:''}
            </div>
            <div style="color:var(--dim);font-size:17px">›</div>
          </div>`).join('');
        return`<div style="background:var(--bg2);border:1px solid rgba(255,71,87,.25);border-radius:12px;margin-bottom:8px;overflow:hidden">
          <div style="display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--bdr)">
            <div style="font-family:var(--mono);font-size:24px;font-weight:700;color:#ff8a96;background:rgba(255,71,87,.12);border:1px solid rgba(255,71,87,.3);border-radius:8px;padding:4px 12px">${code}</div>
            <div style="flex:1">
              <div style="font-size:13px;color:var(--txt)">${name}</div>
              <div style="font-size:10px;font-weight:700;color:#ff8a96;margin-top:2px">🔴 港鐵 MTR</div>
            </div>
          </div>
          ${dirs_rows}
        </div>`;
      }).join('');
      sections.push(mtrHtml);
    }
  }

  // ── LRT ───────────────────────────────────────────────────────────────────
  if(ts.lrt){
    // 按路線號、描述、或站名匹配
    const lrtStnHit=new Map(); // routeNo → {n,id} of matched stop
    if(qZh.length>=2){
      Object.entries(LRT_ROUTES_DATA).forEach(([no,rd])=>{
        const hit=rd.stops.find(s=>s.n.includes(qZh));
        if(hit) lrtStnHit.set(no,{n:hit.n,id:hit.id});
      });
    }
    const lrtMatch=Object.entries(LRT_ROUTES_DATA).filter(([no,rd])=>
      no===q||no.startsWith(q)||rd.desc.includes(qZh)||
      q==='LRT'||qZh==='輕鐵'||lrtStnHit.has(no)
    );
    if(lrtMatch.length){
      const lrtHtml=`<div class="srch-section-lbl">🚊 輕鐵 LRT</div>`+lrtMatch.map(([no,rd])=>{
        const matchedSta=lrtStnHit.get(no);
        const sub=matchedSta?`包含「${matchedSta.n}」站`:'';
        const focusId=matchedSta?matchedSta.id:'';
        const focusArg=focusId?`,'${focusId}'`:'';
        // 去程 row
        const row_out=`<div onclick="openLRTRouteDetail('${no}','${esc(rd.desc)}'${focusArg},'out')"
            style="display:flex;align-items:center;padding:11px 14px;cursor:pointer;border-bottom:1px solid var(--bdr)"
            ontouchstart="this.style.background='var(--bg3)'" ontouchend="this.style.background=''">
            <div style="flex:1">
              <div style="font-size:13px;font-weight:500;color:var(--txt)">往 ${rd.to||rd.desc}</div>
              ${sub?`<div style="font-size:11px;color:var(--mid);margin-top:2px">${sub}</div>`:''}
            </div>
            <div style="color:var(--dim);font-size:17px">›</div>
          </div>`;
        // 回程 row（循環線不加）
        const row_ret=rd.circular?'':`<div onclick="openLRTRouteDetail('${no}','${esc(rd.desc)}'${focusArg},'in')"
            style="display:flex;align-items:center;padding:11px 14px;cursor:pointer;border-bottom:1px solid var(--bdr)"
            ontouchstart="this.style.background='var(--bg3)'" ontouchend="this.style.background=''">
            <div style="flex:1">
              <div style="font-size:13px;font-weight:500;color:var(--txt)">往 ${rd.from||rd.desc}（回程）</div>
            </div>
            <div style="color:var(--dim);font-size:17px">›</div>
          </div>`;
        return`<div style="background:var(--bg2);border:1px solid rgba(255,165,0,.25);border-radius:12px;margin-bottom:8px;overflow:hidden">
          <div style="display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--bdr)">
            <div style="font-family:var(--mono);font-size:22px;font-weight:700;color:#ffaa33;background:rgba(255,165,0,.1);border:1px solid rgba(255,165,0,.3);border-radius:8px;padding:4px 10px">${no}</div>
            <div style="flex:1">
              <div style="font-size:13px;color:var(--txt)">${rd.desc}</div>
              <div style="font-size:10px;font-weight:700;color:#ffaa33;margin-top:2px">🚊 輕鐵 LRT</div>
            </div>
          </div>
          ${row_out}${row_ret}
        </div>`;
      }).join('');
      sections.push(lrtHtml);
    }
  }

  if(!sections.length){
    const hint=`九巴${ts.ctb?' · 城巴':''}${ts.mtr?' · 港鐵':''}${ts.lrt?' · 輕鐵':''}`;
    el.innerHTML=`<div style="text-align:center;padding:28px 20px;color:var(--mid)">
      <div style="font-size:32px;margin-bottom:10px">🔍</div>
      <div style="font-size:15px;font-weight:500;color:var(--bright)">找不到「${raw}」</div>
      <div style="font-size:12px;color:var(--mid);margin-top:6px;line-height:1.8">
        已搜尋：${hint}<br>
        支援：路線號碼（40X）、中文起終點（荃灣）、站名（尖沙咀）
      </div>
      <button onclick="_allRoutes=null;window._ctbRoutes=null;doRouteSearch()" style="margin-top:14px;background:var(--bg3);border:1px solid var(--bdr2);color:var(--txt);border-radius:9px;padding:9px 20px;font-size:13px;cursor:pointer;font-family:var(--sans)">↺ 重新搜尋</button>
    </div>`;
  }else{
    el.innerHTML=sections.join('');
  }
}

async function openCTBDetail(route,bound,dest){
  setDTitle(`城巴 ${route} 路線詳情`);
  const el=document.getElementById('drawer-body');
  el.innerHTML=`<div class="spinner"></div>`;
  openOverlay();
  try{
    const dir=bound==='O'||bound==='outbound'?'outbound':'inbound';
    // 取路線資訊（起終點名）
    let routeDest=dest, routeOrig='';
    if(!routeDest){
      try{
        const ri=await fetch(`https://rt.data.gov.hk/v2/transport/citybus/route/ctb/${route}`).then(r=>r.json());
        const rd=ri.data;
        if(rd){
          routeDest=dir==='outbound'?(rd.dest_tc||rd.dest_en||''):(rd.orig_tc||rd.orig_en||'');
          routeOrig=dir==='outbound'?(rd.orig_tc||rd.orig_en||''):(rd.dest_tc||rd.dest_en||'');
        }
      }catch{}
    }
    const sd=await fetch(`https://rt.data.gov.hk/v2/transport/citybus/route-stop/ctb/${route}/${dir}`).then(r=>r.json());
    const rawStops=sd.data||[];

    // 先顯示框架（站名顯示 … 等待載入）
    const renderList=(namedStops)=>`
      <div class="route-detail-hdr">
        <div class="route-detail-badge" style="color:#2ed573;background:rgba(46,213,115,.1);border-color:rgba(46,213,115,.3)">${route}</div>
        <div class="route-detail-info">
          <div class="route-detail-dest">往 ${routeDest||dest||'(目的地)'} <span style="font-size:10px;color:var(--mid)">[城巴]</span></div>
          <div class="route-detail-orig">${namedStops.length} 個站</div>
        </div>
      </div>
      <div class="dir-tab-row">
        <div class="dir-tab${dir==='outbound'?' active':''}" onclick="openCTBDetail('${esc(route)}','O','')">去程</div>
        <div class="dir-tab${dir==='inbound'?' active':''}" onclick="openCTBDetail('${esc(route)}','I','')">回程</div>
      </div>
      <div class="route-stop-list">${namedStops.map((s,i)=>`
        <div class="rsl-item" onclick="_openCTBStopEta('${s.stopId}','${esc(s.name)}','${route}','${esc(dest||'')}','${dir==='outbound'?'O':'I'}')">
          <div class="rsl-line"></div>
          <div class="rsl-dot${i===0?' first':i===namedStops.length-1?' last':''}"></div>

          <div class="rsl-name">${s.name}</div>
          <div style="color:var(--dim);font-size:14px">›</div>
        </div>`).join('')}
      </div>`;

    // 先用 stopId 顯示（快速顯示）
    const placeholder=rawStops.map(s=>({seq:s.seq,stopId:s.stop,name:'…'}));
    el.innerHTML=renderList(placeholder);

    // 然後批次抓站名（每站個別 fetch，並行）
    // 優先用快取
    if(!window._ctbStopNames)window._ctbStopNames={};
    const cache=window._ctbStopNames;
    const toFetch=rawStops.filter(s=>!cache[s.stop]);
    await Promise.all(toFetch.map(async s=>{
      try{
        const d=await fetch(`https://rt.data.gov.hk/v2/transport/citybus/stop/${s.stop}`).then(r=>r.json());
        cache[s.stop]=d.data?.name_tc||d.data?.name_en||s.stop;
      }catch{cache[s.stop]=s.stop;}
    }));
    const named=rawStops.map(s=>({seq:s.seq,stopId:s.stop,name:cache[s.stop]||s.stop}));
    if(document.getElementById('overlay').classList.contains('open')){
      el.innerHTML=renderList(named);
    }
  }catch(e){el.innerHTML=`<div class="msg">載入失敗：${e.message}</div>`}
}

// MTR 方向標籤：lineCode → [上行終點名, 下行終點名]
const MTR_DIR_LABELS={
  TWL:['中環','荃灣'],ISL:['柴灣','堅尼地城'],KTL:['調景嶺','黃埔'],
  EAL:['落馬洲/羅湖','紅磡'],TKL:['康城','北角'],TCL:['東涌','香港'],
  AEL:['機場/博覽館','香港'],SIL:['海怡半島','金鐘'],TML:['烏溪沙','屯門'],
};

async function openMTRLineDetail(lineCode, focusStaCode, initDir){
  const lineName=MTR_LINE[lineCode]||lineCode;
  setDTitle(`🔴 ${lineName}`);
  const el=document.getElementById('drawer-body');
  el.innerHTML=`<div class="spinner"></div>`;
  openOverlay();
  _renderMTRLineDir(lineCode, focusStaCode, initDir||'up', el);
}

function _renderMTRLineDir(lineCode, focusStaCode, dir, el){
  const lineName=MTR_LINE[lineCode]||lineCode;
  const allStations=MTR_LINE_STATIONS[lineCode]||[];
  if(!allStations.length){el.innerHTML=`<div class="msg">暫無此綫站點資料</div>`;return;}
  // UP = 原序，DOWN = 反序
  const stations=dir==='up'?[...allStations]:[...allStations].reverse();
  const dirLabels=MTR_DIR_LABELS[lineCode]||['上行','下行'];
  const upLabel=dirLabels[0], dnLabel=dirLabels[1];

  el.innerHTML=`
    <div class="route-detail-hdr">
      <div class="route-detail-badge" style="color:#ff8a96;background:rgba(255,71,87,.12);border-color:rgba(255,71,87,.35)">${lineCode}</div>
      <div class="route-detail-info">
        <div class="route-detail-dest">${lineName}</div>
        <div class="route-detail-orig">港鐵 MTR · ${stations.length} 個站</div>
      </div>
    </div>
    <div class="dir-tab-row">
      <div class="dir-tab${dir==='up'?' active':''}" onclick="_renderMTRLineDir('${lineCode}','${focusStaCode||''}','up',document.getElementById('drawer-body'))">
        ↑ 往 ${upLabel}
      </div>
      <div class="dir-tab${dir==='down'?' active':''}" onclick="_renderMTRLineDir('${lineCode}','${focusStaCode||''}','down',document.getElementById('drawer-body'))">
        ↓ 往 ${dnLabel}
      </div>
    </div>
    ${focusStaCode?`<div style="background:rgba(240,165,0,.08);border:1px solid var(--amb-bdr);border-radius:8px;padding:7px 12px;margin-bottom:4px;font-size:12px;color:var(--amb2)">📍 已標記搜尋站：${(MTR_LINE_STATIONS[lineCode]||[]).find(s=>s.c===focusStaCode)?.n||focusStaCode}</div>`:''}
    <div id="mtr-station-list" class="route-stop-list">${stations.map((s,i)=>{
      const isFocus=focusStaCode&&s.c===focusStaCode;
      return`<div class="rsl-item${isFocus?' rsl-focus':''}" onclick="_openMTRStaEta('${lineCode}','${s.c}','${esc(s.n)}')">
        <div class="rsl-line"></div>
        <div class="rsl-dot${i===0?' first':i===stations.length-1?' last':''}"></div>
        <div class="rsl-seq">${i+1}</div>
        <div class="rsl-name">${s.n}${isFocus?'<span style="font-size:10px;color:var(--amb2);margin-left:6px">▶ 搜尋站</span>':''}</div>
        <div class="rsl-eta" id="mtr-eta-${lineCode}-${s.c}"><span style="color:var(--dim);font-size:11px">…</span></div>
      </div>`;
    }).join('')}
    </div>`;

  // 滾動到 focus 站（等 drawer 動畫完）
  if(focusStaCode){
    setTimeout(()=>{
      const focusEl=document.querySelector('#mtr-station-list .rsl-focus');
      if(focusEl){
        const drawerBody=document.getElementById('drawer-body');
        if(drawerBody){
          const elTop=focusEl.offsetTop;
          drawerBody.scrollTo({top:Math.max(0,elTop-120),behavior:'smooth'});
        } else {
          focusEl.scrollIntoView({block:'center',behavior:'smooth'});
        }
      }
    },320);
  }

  // 並行抓所有站 ETA
  const apiDir=dir==='up'?'UP':'DOWN';
  Promise.all(allStations.map(async s=>{
    try{
      const d=await fetch(`${MTR_API}?line=${lineCode}&sta=${s.c}`).then(r=>r.json());
      if(d.status!==0)return;
      const dirs=d.data?.[`${lineCode}-${s.c}`];
      if(!dirs)return;
      const now=Date.now();
      const train=(dirs[apiDir]||[])[0];
      const fmt=tr=>{
        if(!tr)return null;
        const ts=new Date(tr.time).getTime();
        const m=Math.round((ts-now)/60000);
        if(m<0)return null;
        return m<=1?'即將':m+'分';
      };
      const t=fmt(train);
      const etaEl=document.getElementById(`mtr-eta-${lineCode}-${s.c}`);
      if(!etaEl)return;
      if(!t){etaEl.innerHTML=`<span style="color:var(--dim);font-size:10px">無班次</span>`;return;}
      const cls=parseInt(t)<3?'soon':parseInt(t)<9?'coming':'';
      etaEl.innerHTML=`<span class="rsl-eta${cls?' '+cls:''}" style="font-size:12px">${t}</span>`;
    }catch{}
  }));
}

async function _openMTRStaEta(lineCode,staCode,staName){

      ${dirs?fmtDir(dirs.UP,'上行 ↑')+fmtDir(dirs.DOWN,'下行 ↓'):'<div class="msg">暫無班次資料</div>'}
      <div style="height:8px"></div>`;
  }catch(e){
    el.innerHTML=`<button class="back-link" onclick="openMTRLineDetail('${lineCode}')">‹ 返回</button><div class="msg">載入失敗</div>`;
  }
}

    <div class="dir-tab-row">

      <div class="dir-tab${isInbound?' active':''}"  onclick="openLRTRouteDetail('${routeNo}','${esc(desc)}'${focusArg},'in')">往 ${rd.from||'回程'}（回程）</div>

  el.innerHTML=`
    <div class="route-detail-hdr">
      <div class="route-detail-badge" style="color:#ffaa33;background:rgba(255,165,0,.1);border-color:rgba(255,165,0,.35)">${routeNo}</div>
      <div class="route-detail-info">
        <div class="route-detail-dest">${isInbound?`往 ${rd?.from||'回程'}（回程）`:`往 ${rd?.to||desc}`}</div>

    }).join('')}
    </div>`;

  // 滾動到 focus 站（等 drawer 動畫完成）
  if(focusStaId){
    setTimeout(()=>{
      const focusEl=document.querySelector('#lrt-stop-list .rsl-focus');
      if(focusEl){
        const drawerBody=document.getElementById('drawer-body');
        if(drawerBody){
          drawerBody.scrollTo({top:Math.max(0,focusEl.offsetTop-120),behavior:'smooth'});
        } else {
          focusEl.scrollIntoView({block:'center',behavior:'smooth'});
        }
      }
    },320);
  }
}

async function _openLRTStaEta(stationId,stationName,routeNo,routeDesc){
  setDTitle(`${stationName}`);

  el.innerHTML=`<button class="back-link" onclick="openLRTRouteDetail('${routeNo}','${esc(routeDesc)}')">‹ 輕鐵 ${routeNo}</button><div class="spinner"></div>`;

            <div style="font-size:12px;color:var(--mid)">往 ${r.dest}</div>

          <div style="font-size:11px;color:var(--dim)">月台 ${r.plat}</div>
        </div>`;
      }).join(''):`<div class="msg">暫無班次資料</div>`}
      <div style="height:8px"></div>`;
  }catch(e){
    el.innerHTML=`<button class="back-link" onclick="openLRTRouteDetail('${routeNo}','${esc(routeDesc)}')">‹ 返回</button><div class="msg">載入失敗：${e.message}</div>`;
  }
}

async function fetchLRTNearby(lat,lng,radius){
  try{
    const nearby=LRT_STNS
      .map(s=>({...s,dist:haverDist(lat,lng,s.lat,s.lng)}))
      .filter(s=>s.dist<=Math.min(radius,1500))
      .sort((a,b)=>a.dist-b.dist).slice(0,4);
    if(!nearby.length)return[];
    const results=[];
    await Promise.all(nearby.map(async stn=>{
      try{
        const d=await fetch(`${LRT_API}?station_id=${stn.id}`).then(r=>r.json());
        if(d.status!=='1')return;
        (d.platform_list||[]).forEach(plat=>{
          (plat.route_list||[]).slice(0,2).forEach(route=>{
            if(!route.time_en)return;
            const mins=parseInt(route.time_en);
            if(isNaN(mins))return;
            const ts=Date.now()+mins*60000;
            results.push({
              type:'lrt',route:route.route_no,stopName:stn.n,
              dest:route.dest_ch||route.dest_en||'',stopId:stn.id,serviceType:'1',
              _etas:[ts],_first:ts,dist:Math.round(stn.dist),
            });
          });
        });
      }catch{}
    }));
    return results;
  }catch{return[]}
}

async function fetchMTRNearby(lat,lng){
  const stn=nearestOf(MTR_STNS,lat,lng);
  const dist=haverDist(lat,lng,stn.lat,stn.lng);
  if(dist>1500)return[]; // only show if within 1.5km
  const results=[];
  for(const line of stn.lines.slice(0,2)){
    try{
      const code=stn.codes[line];
      const d=await fetch(`${MTR_API}?line=${line}&sta=${code}`).then(r=>r.json());
      if(d.status!==0)continue;
      const dirs=d.data?.[`${line}-${code}`];
      if(!dirs)continue;
      ['UP','DOWN'].forEach(dir=>{
        const trains=(dirs[dir]||[]).slice(0,3);
        if(!trains.length)return;
        const etas=trains.map(t=>{
          const ts=new Date(t.time).getTime();
          return ts;
        }).filter(ts=>ts>Date.now()-30000);
        if(etas.length){
          results.push({
            type:'mtr',route:line,stopName:stn.n,dest:dir==='UP'?'往上行':'往下行',
            _etas:etas,_first:etas[0],stopId:code,serviceType:'1',dist:Math.round(dist),
            lineName:MTR_LINE[line]||line,
          });
        }
      });
    }catch{}
  }
  return results;
}

async function fetchCTBNearby(lat,lng,radius){
  try{
    // CTB stop list is large; use a cached approach
    const _ctbSt=await _ensureCTBStops();
    const nearby=(_ctbSt||[])
      .map(s=>({...s,dist:haverDist(lat,lng,parseFloat(s.lat||s.latitude),parseFloat(s.long||s.longitude))}))
      .filter(s=>s.dist<=radius&&!isNaN(s.dist))
      .sort((a,b)=>a.dist-b.dist).slice(0,8);
    const now=Date.now();
    const results=[];
    await Promise.all(nearby.map(async stop=>{
      try{
        const d=await fetch(`${CTB}/eta/CTB/${stop.stop}/all`).then(r=>r.json());
        const seen=new Set();
        (d.data||[]).forEach(e=>{
          if(!e.eta)return;
          const ts=new Date(e.eta).getTime();
          if(ts<now-30000)return;
          const key=`${e.route}_${e.dir}`;
          if(!seen.has(key)){
            seen.add(key);
            results.push({
              type:'ctb',route:e.route,stopName:stop.name_tc||stop.stop,
              dest:e.dest_tc||'',stopId:stop.stop,serviceType:'1',
              _etas:[ts],_first:ts,dist:Math.round(stop.dist),
            });
          } else {
            const ex=results.find(r=>r.route===e.route&&r.stopId===stop.stop);
            if(ex&&ex._etas.length<3)ex._etas.push(ts);
          }
        });
      }catch{}
    }));
    return results;
  }catch{return[]}
}
