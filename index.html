<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#06080d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="生活日常">
<title>生活日常</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@300;400;500;700&family=Azeret+Mono:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06080d;--bg2:#0d0f18;--bg3:#131620;--bg4:#1a1f30;
  --bdr:#1c2130;--bdr2:#262f48;
  --amb:#f0a500;--amb2:#ffc03a;
  --amb-bg:rgba(240,165,0,.09);--amb-bdr:rgba(240,165,0,.26);
  --grn:#2ed573;--red:#ff4757;--blu:#5b8fff;
  --txt:#dce3f4;--mid:#8591b0;--dim:#35405a;--bright:#ccd4ed;
  --mono:'Azeret Mono',monospace;--sans:'Noto Sans HK',sans-serif;
  --nav-h:58px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--txt);font-family:var(--sans);display:flex;flex-direction:column}

/* ══ PAGE SYSTEM ══ */
.page{display:none;flex:1;flex-direction:column;overflow:hidden}
.page.active{display:flex}

/* ══ BOTTOM NAV ══ */
.bottom-nav{
  flex-shrink:0;height:var(--nav-h);background:var(--bg2);
  border-top:1px solid var(--bdr);display:flex;
  padding-bottom:env(safe-area-inset-bottom,0);
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;background:none;border:none;
  color:var(--mid);cursor:pointer;font-family:var(--sans);
  transition:color .15s;padding:6px 0;
}
.nav-btn .nav-ico{font-size:22px;line-height:1}
.nav-btn .nav-lbl{font-size:11px;font-weight:500}
.nav-btn.active{color:var(--amb2)}

/* ══ WEATHER ══ */
.w-panel{flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--bdr);padding:11px 14px 10px;position:relative;overflow:hidden}
.w-panel::after{content:'';position:absolute;top:-40px;right:-20px;width:170px;height:170px;background:radial-gradient(circle,rgba(240,165,0,.07) 0%,transparent 70%);pointer-events:none}

/* Row 1: temp + clock */
.w-r1{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.w-temp-big{font-family:var(--mono);font-size:52px;font-weight:700;line-height:1;color:var(--txt)}
.w-temp-big sup{font-size:20px;font-weight:400;color:var(--mid);vertical-align:super}
.w-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.w-clock{font-family:var(--mono);font-size:30px;font-weight:700;color:var(--amb);line-height:1}
.w-date{font-size:11px;color:var(--mid)}
.w-btns{display:flex;gap:5px;margin-top:3px}
.w-btn{display:inline-flex;align-items:center;gap:4px;background:var(--bg3);border:1px solid var(--bdr2);border-radius:7px;padding:5px 10px;color:var(--mid);font-size:12px;cursor:pointer;font-family:var(--sans);transition:all .15s;white-space:nowrap}
.w-btn:active{border-color:var(--amb);color:var(--amb)}
.w-btn.spinning .ico{display:inline-block;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Row 2: icon + desc (below temp) */
.w-r2{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.w-icon{font-size:36px;line-height:1;flex-shrink:0;margin-top:2px}
.w-desc{font-size:13px;color:var(--bright);line-height:1.55;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}

/* Warnings */
.w-warns{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:7px}
.warn-pill{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:600;background:rgba(255,71,87,.13);border:1px solid rgba(255,71,87,.32);color:#ff8a96}
.warn-pill.amb{background:rgba(240,165,0,.11);border-color:rgba(240,165,0,.32);color:var(--amb2)}

/* Forecast strip */
.w-fore{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:1px}
.w-fore::-webkit-scrollbar{display:none}
.fc{display:flex;flex-direction:column;align-items:center;gap:3px;background:var(--bg3);border:1px solid var(--bdr);border-radius:9px;padding:7px 10px;flex-shrink:0;min-width:60px}
.fc.hl{background:var(--bg4);border-color:var(--amb-bdr)}
.fc-lbl{font-size:12px;color:var(--mid);font-family:var(--mono)}
.fc-lbl.named{font-size:13px;font-weight:700;color:var(--amb2)}
.fc-ico{font-size:22px;margin:2px 0}
.fc-tt{font-family:var(--mono);font-size:12px;display:flex;gap:5px}
.fc-hi{color:#ff8c5a}.fc-lo{color:var(--blu)}

/* ══ PROFILES (tabs) ══ */
.profiles-bar{flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--bdr);padding:6px 10px;display:flex;align-items:center;gap:6px;overflow-x:auto;scrollbar-width:none;min-height:62px}
.profiles-bar::-webkit-scrollbar{display:none}
.profile-tab{display:flex;align-items:center;justify-content:center;height:48px;padding:0 22px;border-radius:12px;font-size:17px;font-weight:500;cursor:pointer;color:var(--mid);background:var(--bg3);border:1px solid var(--bdr);white-space:nowrap;flex-shrink:0;transition:all .15s;font-family:var(--sans);user-select:none;touch-action:none}
.profile-tab.active{background:var(--amb-bg);color:var(--amb2);border-color:var(--amb-bdr)}
.profile-tab.nearby-tab{color:var(--blu);border-color:rgba(91,143,255,.3)}
.profile-tab.nearby-tab.active{background:rgba(91,143,255,.1);color:#7ba8ff;border-color:rgba(91,143,255,.45)}
.profile-tab.tab-ghost{opacity:.25}
.profile-tab.tab-slot{border:1px dashed var(--amb-bdr);background:rgba(240,165,0,.04);color:transparent}
.add-profile-btn{flex-shrink:0;height:48px;min-width:48px;border-radius:12px;background:var(--bg3);border:1px solid var(--bdr2);color:var(--mid);font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.add-profile-btn:active{border-color:var(--amb);color:var(--amb)}

/* ══ BUS ══ */
.bus-sec{flex:1;display:flex;flex-direction:column;overflow:hidden}
.bus-hdr{flex-shrink:0;display:flex;align-items:center;gap:7px;padding:8px 12px 6px}
.bus-hdr-lbl{font-size:10px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--dim);font-family:var(--mono);flex:1}
.eta-mode-btn{display:flex;align-items:center;gap:4px;background:var(--bg3);border:1px solid var(--bdr2);border-radius:8px;padding:6px 10px;color:var(--mid);font-size:12px;font-weight:500;cursor:pointer;flex-shrink:0;white-space:nowrap;font-family:var(--sans);transition:all .15s}
.eta-mode-btn.mins{border-color:rgba(91,143,255,.35);color:#7ba8ff;background:rgba(91,143,255,.08)}
.add-btn{display:flex;align-items:center;gap:5px;background:var(--amb-bg);border:1px solid var(--amb-bdr);border-radius:8px;padding:6px 13px;color:var(--amb);font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0;white-space:nowrap}
.add-btn:active{opacity:.7}
.bus-list{flex:1;overflow-y:auto;padding:0 10px 10px;scrollbar-width:thin;scrollbar-color:var(--bdr) transparent}

.bus-card{display:flex;align-items:stretch;background:var(--bg2);border:1px solid var(--bdr);border-radius:13px;margin-bottom:9px;overflow:hidden;animation:slideIn .2s ease both;position:relative;user-select:none;transition:border-color .15s,opacity .15s}
.bus-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--dim);border-radius:13px 0 0 13px;transition:background .25s}
.bus-card.soon::before{background:var(--red)}
.bus-card.coming::before{background:var(--amb)}
.bus-card.ok::before{background:var(--grn)}
.bus-card.card-ghost{opacity:.25}
.bus-card.card-slot{border:1px dashed var(--amb-bdr);background:rgba(240,165,0,.04)}
.bus-card.card-slot::before{background:transparent}
@keyframes slideIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

.drag-handle{display:flex;align-items:center;justify-content:center;padding:0 9px;color:var(--dim);font-size:18px;cursor:grab;flex-shrink:0;touch-action:none;letter-spacing:-2px}
.bus-badge{display:flex;align-items:center;justify-content:center;background:var(--amb-bg);border-right:1px solid var(--amb-bdr);color:var(--amb2);font-family:var(--mono);font-size:38px;font-weight:700;width:90px;flex-shrink:0;text-shadow:0 0 18px rgba(240,165,0,.28);letter-spacing:-1px}
.bus-info{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;padding:12px 12px}
.bus-stop{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.bus-dest{font-size:12px;color:var(--mid)}
.bus-eta-wrap{display:flex;align-items:center;padding:0 12px 0 4px;flex-shrink:0}
.eta-row{display:flex;align-items:baseline;gap:9px}
.e1{font-family:var(--mono);font-size:26px;font-weight:700;line-height:1}
.e1.sc{color:var(--red)}.e1.cc{color:var(--amb2)}.e1.oc{color:var(--grn)}
.e2{font-family:var(--mono);font-size:16px;color:var(--mid);line-height:1}
.e3{font-family:var(--mono);font-size:13px;color:var(--dim);line-height:1}
.e-none{font-family:var(--mono);font-size:13px;color:var(--dim)}
.bus-rm{display:flex;align-items:center;background:none;border:none;color:var(--dim);font-size:18px;padding:0 10px;cursor:pointer;flex-shrink:0;transition:color .15s;align-self:stretch}
.bus-rm:active{color:var(--red)}
.nearby-dist{font-family:var(--mono);font-size:11px;color:var(--blu);white-space:nowrap;flex-shrink:0}

.empty-state{text-align:center;padding:36px 20px;color:var(--mid)}
.empty-icon{font-size:44px;margin-bottom:12px;opacity:.25}
.empty-text{font-size:15px;margin-bottom:5px}
.empty-sub{font-size:12px;color:var(--dim);line-height:1.6}

/* ══ SETTINGS PAGE ══ */
.settings-scroll{flex:1;overflow-y:auto;padding:16px 14px 20px}
.sett-title{font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);font-family:var(--mono);margin:20px 0 10px}
.sett-title:first-child{margin-top:0}
.sett-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:13px;overflow:hidden;margin-bottom:4px}
.sett-row{display:flex;align-items:center;padding:14px 16px;gap:12px;cursor:pointer;transition:background .15s;border-bottom:1px solid var(--bdr)}
.sett-row:last-child{border-bottom:none}
.sett-row:active{background:var(--bg3)}
.sett-ico{font-size:20px;flex-shrink:0;width:28px;text-align:center}
.sett-lbl{flex:1}
.sett-lbl-main{font-size:15px;font-weight:500}
.sett-lbl-sub{font-size:12px;color:var(--mid);margin-top:2px}
.sett-chev{color:var(--dim);font-size:18px}

.copy-block{background:var(--bg2);border:1px solid var(--bdr);border-radius:13px;padding:16px;text-align:center}
.copy-app{font-size:22px;font-weight:700;margin-bottom:4px;color:var(--amb2)}
.copy-ver{font-size:12px;color:var(--mid);margin-bottom:12px;font-family:var(--mono)}
.copy-line{font-size:12px;color:var(--mid);line-height:1.8}
.copy-line a{color:var(--blu);text-decoration:none}

/* ══ OVERLAY / DRAWER ══ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.76);z-index:50;display:none;align-items:flex-end;backdrop-filter:blur(5px)}
.overlay.open{display:flex}
.drawer{background:var(--bg2);border-top:1px solid var(--bdr2);border-radius:20px 20px 0 0;width:100%;max-height:90dvh;display:flex;flex-direction:column;animation:drawerUp .24s cubic-bezier(.34,1.56,.64,1)}
@keyframes drawerUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.drawer-handle{width:36px;height:4px;background:var(--bdr2);border-radius:2px;margin:11px auto 0;flex-shrink:0}
.drawer-title{font-size:15px;font-weight:600;padding:12px 15px 9px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.drawer-close{background:var(--bg3);border:none;color:var(--mid);width:28px;height:28px;border-radius:50%;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.drawer-body{flex:1;overflow-y:auto;padding:0 14px 28px}
.search-row{display:flex;gap:8px;margin-bottom:13px}
.d-input{flex:1;background:var(--bg3);border:1px solid var(--bdr2);border-radius:10px;padding:12px 13px;color:var(--txt);font-family:var(--mono);font-size:18px;letter-spacing:.12em;text-transform:uppercase;outline:none;transition:border-color .15s}
.d-input::placeholder{color:var(--dim);font-size:13px;text-transform:none;letter-spacing:normal;font-family:var(--sans)}
.d-input:focus{border-color:var(--amb)}
.d-input.plain{font-size:15px;letter-spacing:normal;text-transform:none;font-family:var(--sans)}
.d-btn{background:var(--amb);color:#000;border:none;border-radius:10px;padding:12px 14px;font-weight:700;font-size:14px;cursor:pointer;font-family:var(--sans)}
.d-btn:active{opacity:.8}
.sec-lbl{font-size:10px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--dim);font-family:var(--mono);margin-bottom:9px}
.result-item{display:flex;align-items:center;gap:11px;padding:12px;background:var(--bg3);border:1px solid var(--bdr);border-radius:10px;margin-bottom:7px;cursor:pointer;transition:border-color .15s}
.result-item:active{border-color:var(--amb)}
.rn{font-family:var(--mono);font-size:17px;font-weight:700;color:var(--amb2);min-width:44px}
.ri{flex:1}.ri-dest{font-size:14px;font-weight:500}.ri-orig{font-size:11px;color:var(--mid);margin-top:2px}
.chev{color:var(--dim);font-size:18px}
.stop-item{display:flex;align-items:center;gap:10px;padding:11px 12px;background:var(--bg3);border:1px solid var(--bdr);border-radius:10px;margin-bottom:6px;cursor:pointer;transition:border-color .15s}
.stop-item:active{border-color:var(--amb)}
.stop-seq{font-family:var(--mono);font-size:11px;color:var(--dim);min-width:24px}
.stop-name{flex:1;font-size:14px}
.back-link{display:inline-flex;align-items:center;gap:5px;color:var(--amb);font-size:13px;cursor:pointer;margin-bottom:12px;background:none;border:none;font-family:var(--sans);padding:0}
.loc-note{font-size:11px;color:var(--mid);background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;padding:9px 12px;margin-bottom:12px;line-height:1.6}
.loc-note strong{color:var(--amb2)}
.loc-gps-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:rgba(91,143,255,.1);border:1px solid rgba(91,143,255,.3);border-radius:10px;padding:12px;margin-bottom:10px;color:#7ba8ff;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--sans)}
.loc-gps-btn:active{opacity:.8}
.loc-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.loc-item{background:var(--bg3);border:1px solid var(--bdr);border-radius:10px;padding:10px;cursor:pointer;transition:all .15s;text-align:center}
.loc-item:active,.loc-item.sel{border-color:var(--amb);background:var(--amb-bg)}
.loc-name{font-size:13px;font-weight:500}.loc-reg{font-size:11px;color:var(--mid);margin-top:2px}
.rename-row{display:flex;gap:8px;margin-bottom:12px}
.del-btn{width:100%;background:rgba(255,71,87,.12);border:1px solid rgba(255,71,87,.3);color:#ff7b89;border-radius:10px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--sans);margin-top:4px}
.del-btn:active{opacity:.8}
.spinner{width:20px;height:20px;border:2px solid var(--bdr2);border-top-color:var(--amb);border-radius:50%;animation:spin .7s linear infinite;margin:30px auto}
.msg{text-align:center;color:var(--mid);font-size:14px;padding:24px 0;line-height:1.7}
.toast{position:fixed;bottom:calc(var(--nav-h) + 14px);left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--bdr2);border-radius:10px;padding:10px 18px;font-size:13px;color:var(--bright);white-space:nowrap;z-index:200;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
.float-clone{position:fixed;z-index:999;pointer-events:none;box-shadow:0 10px 32px rgba(0,0,0,.7);border-radius:12px;opacity:.88}
</style>
</head>
<body>

<!-- ══ HOME PAGE ══ -->
<div class="page active" id="page-home">

  <!-- WEATHER -->
  <div class="w-panel">
    <div class="w-r1">
      <div class="w-temp-big"><span id="w-temp">--</span><sup>°C</sup></div>
      <div class="w-right">
        <div class="w-clock" id="clock">--:--</div>
        <div class="w-date"  id="w-date">—</div>
        <div class="w-btns">
          <button class="w-btn" onclick="openLocPicker()">📍 <span id="w-loc-lbl">定位中</span></button>
          <button class="w-btn" id="refresh-btn" onclick="doRefresh()"><span class="ico">↺</span> 更新</button>
        </div>
      </div>
    </div>

    <!-- icon + desc side-by-side below temp -->
    <div class="w-r2">
      <div class="w-icon" id="w-icon">🌡</div>
      <div class="w-desc" id="w-desc">天氣資料載入中…</div>
    </div>

    <div class="w-warns" id="w-warns"></div>
    <div class="w-fore"  id="w-fore"></div>
  </div>

  <!-- PROFILE TABS -->
  <div class="profiles-bar" id="profiles-bar"></div>

  <!-- BUS -->
  <div class="bus-sec">
    <div class="bus-hdr">
      <div class="bus-hdr-lbl" id="bus-hdr-lbl">到站時間</div>
      <button class="eta-mode-btn mins" id="eta-mode-btn" onclick="toggleEtaMode()">⏱ 距離時間</button>
      <button class="add-btn" id="add-route-btn" onclick="openSearch()">＋ 加路線</button>
    </div>
    <div class="bus-list" id="bus-list"></div>
  </div>
</div><!-- end home -->

<!-- ══ SETTINGS PAGE ══ -->
<div class="page" id="page-settings">
  <div class="settings-scroll">

    <div class="sett-title">巴士資料</div>
    <div class="sett-card">
      <div class="sett-row" onclick="exportBusData()">
        <div class="sett-ico">📤</div>
        <div class="sett-lbl">
          <div class="sett-lbl-main">匯出巴士路線</div>
          <div class="sett-lbl-sub">下載 JSON 檔案備份</div>
        </div>
        <div class="sett-chev">›</div>
      </div>
      <div class="sett-row" onclick="document.getElementById('import-file').click()">
        <div class="sett-ico">📥</div>
        <div class="sett-lbl">
          <div class="sett-lbl-main">匯入巴士路線</div>
          <div class="sett-lbl-sub">還原 JSON 備份檔案</div>
        </div>
        <div class="sett-chev">›</div>
      </div>
    </div>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importBusData(event)">

    <div class="sett-title">天氣</div>
    <div class="sett-card">
      <div class="sett-row" onclick="openLocPicker()">
        <div class="sett-ico">📍</div>
        <div class="sett-lbl">
          <div class="sett-lbl-main">天氣地點</div>
          <div class="sett-lbl-sub" id="sett-stn-sub">--</div>
        </div>
        <div class="sett-chev">›</div>
      </div>
    </div>

    <div class="sett-title">關於</div>
    <div class="copy-block">
      <div style="font-size:36px;margin-bottom:6px">🌿</div>
      <div class="copy-app">生活日常</div>
      <div class="copy-ver">v1.0 · 2026</div>
      <div class="copy-line">
        天氣數據：<a href="https://www.hko.gov.hk" target="_blank">香港天文台</a><br>
        巴士到站：<a href="https://data.etabus.gov.hk" target="_blank">九巴開放數據</a><br>
        © 2026 生活日常。保留所有權利。<br>
        本 App 僅供個人使用，數據以原狀提供。
      </div>
    </div>

  </div>
</div><!-- end settings -->

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-home" onclick="switchPage('home')">
    <span class="nav-ico">🌿</span>
    <span class="nav-lbl">主頁</span>
  </button>
  <button class="nav-btn" id="nav-settings" onclick="switchPage('settings')">
    <span class="nav-ico">⚙️</span>
    <span class="nav-lbl">設定</span>
  </button>
</nav>

<!-- OVERLAY -->

<script>
// ═══════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════
const HKO = 'https://data.weather.gov.hk/weatherAPI/opendata/weather.php';
const KMB = 'https://data.etabus.gov.hk/v1/transport/kmb';
const W_ICONS = {
  50:'☀️',51:'🌤',52:'🌤',53:'⛅',54:'🌥',
  60:'☁️',61:'🌧',62:'🌧',63:'🌩',64:'⛈',65:'🌩',
  70:'☀️',71:'🌤',72:'🌤',73:'⛅',74:'🌥',75:'☁️',76:'🌦',77:'🌦',
  80:'🌧',81:'🌧',82:'🌩',83:'⛈',84:'🌪',85:'🌩',90:'🌡',100:'🌫',101:'🌫'
};
const WARN_MAP = {
  WTCSGNL:'熱帶氣旋',WRAINA:'黃色暴雨',WRAINB:'紅色暴雨',WRAINC:'黑色暴雨',
  WFIRE:'山火',WFROST:'霜凍',WHOT:'酷熱',WCOLD:'寒冷',WMSGNL:'強烈季候風',WTHUNDER:'雷暴',WL:'山泥傾瀉'
};
const AMB_WARNS = new Set(['WHOT','WCOLD','WFROST','WTHUNDER']);
const DAY = ['日','一','二','三','四','五','六'];
const HKO_STNS = [
  {n:'香港天文台',r:'油麻地',lat:22.302,lng:114.174},
  {n:'青衣',r:'葵青',lat:22.340,lng:114.104},
  {n:'沙田',r:'沙田',lat:22.415,lng:114.210},
  {n:'大埔',r:'大埔',lat:22.451,lng:114.171},
  {n:'西貢',r:'西貢',lat:22.382,lng:114.274},
  {n:'將軍澳',r:'西貢',lat:22.310,lng:114.257},
  {n:'屯門',r:'屯門',lat:22.391,lng:113.977},
  {n:'元朗',r:'元朗',lat:22.445,lng:114.023},
  {n:'石崗',r:'元朗',lat:22.437,lng:114.079},
  {n:'上水',r:'北區',lat:22.501,lng:114.129},
  {n:'打鼓嶺',r:'北區',lat:22.535,lng:114.148},
  {n:'長洲',r:'離島',lat:22.210,lng:114.028},
  {n:'赤鱲角',r:'離島',lat:22.308,lng:113.920},
  {n:'流浮山',r:'元朗',lat:22.469,lng:113.996},
  {n:'橫瀾島',r:'海上',lat:22.183,lng:114.303},
];
const NEARBY_PID = '__nearby__';
const pad = n => String(n).padStart(2,'0');

function haverDist(la1,ln1,la2,ln2){
  const R=6371000,r=Math.PI/180,dLa=(la2-la1)*r,dLn=(ln2-ln1)*r;
  return 2*R*Math.asin(Math.sqrt(Math.sin(dLa/2)**2+Math.cos(la1*r)*Math.cos(la2*r)*Math.sin(dLn/2)**2));
}
function num(v){
  if(v==null)return null;
  if(typeof v==='number')return isNaN(v)?null:v;
  if(typeof v==='string'){const n=parseFloat(v);return isNaN(n)?null:n}
  if(typeof v==='object')return num(v.value??v.data??Object.values(v).find(x=>typeof x==='number'||typeof x==='string'));
  return null;
}
function hkoFind(arr,stn){
  if(!Array.isArray(arr)||!arr.length)return null;
  return arr.find(d=>d.place===stn)??arr.find(d=>d.place==='香港天文台')??arr[0];
}

// ═══════════════════════════════════
//  STORAGE
// ═══════════════════════════════════
function loadProfiles(){
  const raw=localStorage.getItem('profiles_v2');
  if(raw)return JSON.parse(raw);
  const def=[{id:'p_a',name:'返工'},{id:'p_b',name:'放工'},{id:'p_c',name:'日常'}];
  localStorage.setItem('profiles_v2',JSON.stringify(def));return def;
}
function saveProfiles(p){localStorage.setItem('profiles_v2',JSON.stringify(p))}
function loadFavs(pid){return JSON.parse(localStorage.getItem('favs_'+pid)||'[]')}
function saveFavs(pid,arr){
  localStorage.setItem('favs_'+pid,JSON.stringify(
    arr.map(({route,stopId,stopName,dest,serviceType})=>({route,stopId,stopName,dest,serviceType}))
  ));
}

let profiles  = loadProfiles();
let activePid = localStorage.getItem('active_pid')||profiles[0]?.id||'';
if(!profiles.find(p=>p.id===activePid)) activePid=profiles[0]?.id||'';
function setActivePid(pid){activePid=pid;localStorage.setItem('active_pid',pid)}

let favs        = loadFavs(activePid);
let selectedStn = localStorage.getItem('hko_stn')||'香港天文台';
let refreshing  = false;
let etaMode     = localStorage.getItem('eta_mode')||'mins';
let allStops    = null;
let nearbyLat   = null, nearbyLng = null;

// ═══════════════════════════════════
//  PAGE NAVIGATION
// ═══════════════════════════════════
function switchPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  if(name==='settings') document.getElementById('sett-stn-sub').textContent=selectedStn;
}

// ═══════════════════════════════════
//  CLOCK
// ═══════════════════════════════════
function tickClock(){
  const n=new Date();
  document.getElementById('clock').textContent=`${pad(n.getHours())}:${pad(n.getMinutes())}`;
  document.getElementById('w-date').textContent=`${n.getFullYear()}/${n.getMonth()+1}/${n.getDate()}（${DAY[n.getDay()]}）`;
}
tickClock();setInterval(tickClock,1000);

// ═══════════════════════════════════
//  AUTO GPS ON LOAD → nearest station
// ═══════════════════════════════════
function autoLocate(){
  if(location.protocol==='file:')return; // skip for file:// — silently use saved stn
  if(!navigator.geolocation)return;
  navigator.geolocation.getCurrentPosition(pos=>{
    const{latitude:lat,longitude:lng}=pos.coords;
    let near=HKO_STNS[0],minD=Infinity;
    HKO_STNS.forEach(s=>{const d=Math.hypot(s.lat-lat,s.lng-lng);if(d<minD){minD=d;near=s}});
    if(near.n!==selectedStn){
      selectedStn=near.n;
      localStorage.setItem('hko_stn',near.n);
      document.getElementById('w-loc-lbl').textContent=near.n;
      loadWeather();
    } else {
      document.getElementById('w-loc-lbl').textContent=selectedStn;
    }
    // cache for nearby tab
    nearbyLat=lat;nearbyLng=lng;
  },()=>{
    document.getElementById('w-loc-lbl').textContent=selectedStn;
  },{timeout:8000,maximumAge:60000});
}

// ═══════════════════════════════════
//  WEATHER
// ═══════════════════════════════════
async function loadWeather(){
  try{
    const [rhr,flw,warn]=await Promise.all([
      fetch(`${HKO}?dataType=rhrread&lang=tc`).then(r=>r.json()),
      fetch(`${HKO}?dataType=flw&lang=tc`).then(r=>r.json()),
      fetch(`${HKO}?dataType=warnsum&lang=tc`).then(r=>r.json()),
    ]);
    const tempVal=num(hkoFind(rhr.temperature?.data,selectedStn)?.value);
    document.getElementById('w-temp').textContent=tempVal??'--';
    document.getElementById('w-loc-lbl').textContent=selectedStn;
    document.getElementById('sett-stn-sub').textContent=selectedStn;
    const iconCode=Array.isArray(rhr.icon)?rhr.icon[0]:rhr.icon;
    document.getElementById('w-icon').textContent=W_ICONS[iconCode]??'🌡';
    const activeWarns=Object.entries(warn).filter(([,v])=>v?.actionCode&&v.actionCode!=='CANCEL').map(([k])=>k);
    document.getElementById('w-warns').innerHTML=activeWarns.map(k=>
      `<span class="warn-pill${AMB_WARNS.has(k)?' amb':''}">⚠ ${WARN_MAP[k]||k}</span>`
    ).join('');
    const descTxt=flw.forecastDesc||flw.outlook||'';
    document.getElementById('w-desc').textContent=descTxt||'';
    const fcs=flw.weatherForecast||[];
    document.getElementById('w-fore').innerHTML=fcs.slice(0,7).map((f,i)=>{
      const ds=String(f.forecastDate);
      const lbl=i===0?'今日':i===1?'明天':i===2?'後天':`${ds.slice(4,6)}/${ds.slice(6,8)}`;
      const hl=i===1||i===2;
      return `<div class="fc${hl?' hl':''}">
        <div class="fc-lbl${hl?' named':''}">${lbl}</div>
        <div class="fc-ico">${W_ICONS[f.forecastWeather??f.forecastIcon]??'🌡'}</div>
        <div class="fc-tt"><span class="fc-hi">${num(f.forecastMaxtemp)??'--'}°</span><span class="fc-lo">${num(f.forecastMintemp)??'--'}°</span></div>
      </div>`;
    }).join('');
  }catch(e){console.warn('[weather]',e)}
}

// ═══════════════════════════════════
//  REFRESH
// ═══════════════════════════════════
async function doRefresh(){
  if(refreshing)return;
  refreshing=true;
  const btn=document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  if(activePid===NEARBY_PID)await Promise.all([loadWeather(),loadNearby()]);
  else await Promise.all([loadWeather(),refreshAllETAs()]);
  btn.classList.remove('spinning');
  refreshing=false;
}

// ═══════════════════════════════════
//  ETA MODE TOGGLE
// ═══════════════════════════════════
function toggleEtaMode(){
  etaMode=etaMode==='mins'?'clock':'mins';
  localStorage.setItem('eta_mode',etaMode);
  const btn=document.getElementById('eta-mode-btn');
  if(etaMode==='mins'){btn.textContent='⏱ 距離時間';btn.classList.add('mins')}
  else{btn.textContent='🕐 到站時間';btn.classList.remove('mins')}
  if(activePid===NEARBY_PID)loadNearby();else renderBusList();
}

// ═══════════════════════════════════
//  LOCATION PICKER
// ═══════════════════════════════════
function openLocPicker(){
  setDTitle('天氣地點');
  const isFile=location.protocol==='file:';
  document.getElementById('drawer-body').innerHTML=`
    ${isFile
      ?`<div class="loc-note">💡 以 <strong>file://</strong> 開啟時瀏覽器封鎖定位，請手動選擇，或部署至網絡後可自動定位。</div>`
      :`<button class="loc-gps-btn" id="gps-btn" onclick="useGPS()">📡 用我的位置自動選擇</button>`
    }
    <div class="sec-lbl">手動選擇天文台站</div>
    <div class="loc-grid">
      ${HKO_STNS.map(s=>`<div class="loc-item${s.n===selectedStn?' sel':''}" onclick="pickStn('${s.n}')">
        <div class="loc-name">${s.n}</div><div class="loc-reg">${s.r}</div>
      </div>`).join('')}
    </div>`;
  openOverlay();
}
function pickStn(n){selectedStn=n;localStorage.setItem('hko_stn',n);closeDrawer();loadWeather();document.getElementById('sett-stn-sub').textContent=n}
function useGPS(){
  if(!navigator.geolocation){alert('不支援定位');return}
  const btn=document.getElementById('gps-btn');
  btn.textContent='📡 定位中…';btn.style.opacity='.6';
  navigator.geolocation.getCurrentPosition(pos=>{
    const{latitude:lat,longitude:lng}=pos.coords;
    nearbyLat=lat;nearbyLng=lng;
    let near=HKO_STNS[0],minD=Infinity;
    HKO_STNS.forEach(s=>{const d=Math.hypot(s.lat-lat,s.lng-lng);if(d<minD){minD=d;near=s}});
    pickStn(near.n);
  },()=>{btn.textContent='❌ 定位失敗，請手動選擇';btn.style.opacity='1'},{timeout:10000});
}

// ═══════════════════════════════════
//  PROFILES
// ═══════════════════════════════════
function renderProfiles(){
  const bar=document.getElementById('profiles-bar');
  const nearbyActive=activePid===NEARBY_PID;
  bar.innerHTML=
    `<button class="profile-tab nearby-tab${nearbyActive?' active':''}" onclick="switchToNearby()">📍 附近</button>`+
    profiles.map((p,i)=>
      `<button class="profile-tab${p.id===activePid?' active':''}" data-idx="${i}" data-pid="${p.id}"
        onclick="switchProfile('${p.id}')">${p.name}</button>`
    ).join('')+
    `<button class="add-profile-btn" onclick="addProfile()">＋</button>`;
  bar.querySelectorAll('.profile-tab:not(.nearby-tab)').forEach(tab=>{
    let pressTimer=null;
    const idx=()=>parseInt(tab.dataset.idx);
    tab.addEventListener('touchstart',e=>{
      pressTimer=setTimeout(()=>{pressTimer=null;renameProfile(idx())},600);
      tabDragStart(e,idx());
    },{passive:true});
    tab.addEventListener('touchend',()=>{if(pressTimer){clearTimeout(pressTimer);pressTimer=null}},{passive:true});
    tab.addEventListener('touchmove',()=>{if(pressTimer){clearTimeout(pressTimer);pressTimer=null}},{passive:true});
  });
  document.getElementById('add-route-btn').style.display=activePid===NEARBY_PID?'none':'';
  document.getElementById('bus-hdr-lbl').textContent=activePid===NEARBY_PID?'500米內到站時間':'到站時間';
}

function switchProfile(pid){setActivePid(pid);favs=loadFavs(pid);renderProfiles();refreshAllETAs()}
function switchToNearby(){setActivePid(NEARBY_PID);renderProfiles();loadNearby()}

function addProfile(){
  setDTitle('新增版面');
  document.getElementById('drawer-body').innerHTML=`
    <div class="sec-lbl">版面名稱</div>
    <div class="search-row">
      <input class="d-input plain" id="pname-inp" placeholder="如：上班、週末…" maxlength="10">
      <button class="d-btn" onclick="confirmAddProfile()">確定</button>
    </div>`;
  openOverlay();
  setTimeout(()=>document.getElementById('pname-inp')?.focus(),260);
}
function confirmAddProfile(){
  const name=(document.getElementById('pname-inp')?.value||'').trim();if(!name)return;
  const id='p_'+Date.now();profiles.push({id,name});saveProfiles(profiles);saveFavs(id,[]);
  closeDrawer();switchProfile(id);
}
function renameProfile(idx){
  const p=profiles[idx];
  setDTitle('編輯版面');
  document.getElementById('drawer-body').innerHTML=`
    <div class="sec-lbl">版面名稱</div>
    <div class="rename-row">
      <input class="d-input plain" id="rename-inp" value="${p.name}" maxlength="10">
      <button class="d-btn" onclick="confirmRename(${idx})">儲存</button>
    </div>
    ${profiles.length>1?`<button class="del-btn" onclick="deleteProfile(${idx})">🗑 刪除此版面</button>`:''}`;
  openOverlay();
  setTimeout(()=>{const el=document.getElementById('rename-inp');el?.focus();el?.select()},260);
}
function confirmRename(idx){
  const name=(document.getElementById('rename-inp')?.value||'').trim();if(!name)return;
  profiles[idx].name=name;saveProfiles(profiles);closeDrawer();renderProfiles();
}
function deleteProfile(idx){
  if(!confirm(`確定刪除「${profiles[idx].name}」？`))return;
  const pid=profiles[idx].id;localStorage.removeItem('favs_'+pid);
  profiles.splice(idx,1);saveProfiles(profiles);closeDrawer();
  if(activePid===pid){setActivePid(profiles[0]?.id||'');favs=loadFavs(activePid)}
  renderProfiles();refreshAllETAs();
}

// ── Tab drag ──
let TD={on:false,idx:-1,to:-1,clone:null,startX:0,tabW:72,cloneLeft:0,cloneTop:0};
function tabDragStart(e,idx){
  const bar=document.getElementById('profiles-bar');
  const tabs=bar.querySelectorAll('.profile-tab:not(.nearby-tab)');
  const tab=tabs[idx];if(!tab)return;
  const rect=tab.getBoundingClientRect();
  TD={on:false,idx,to:idx,clone:null,startX:e.touches[0].clientX,tabW:rect.width+6,cloneLeft:rect.left,cloneTop:rect.top};
  TD._p=()=>{
    TD.on=true;
    const cl=tab.cloneNode(true);
    cl.className='float-clone profile-tab active';
    cl.style.cssText=`left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;height:${rect.height}px`;
    document.body.appendChild(cl);TD.clone=cl;tab.classList.add('tab-ghost');
  };
}
document.addEventListener('touchmove',e=>{
  if(TD.idx===-1)return;
  const dx=e.touches[0].clientX-TD.startX;
  if(!TD.on&&Math.abs(dx)>6)TD._p?.();
  if(!TD.on)return;
  TD.clone.style.left=(TD.cloneLeft+dx)+'px';
  const ni=Math.max(0,Math.min(profiles.length-1,TD.idx+Math.round(dx/TD.tabW)));
  if(ni!==TD.to){TD.to=ni;document.querySelectorAll('.profile-tab:not(.nearby-tab)').forEach((t,i)=>t.classList.toggle('tab-slot',i===ni&&i!==TD.idx))}
},{passive:true});
document.addEventListener('touchend',()=>{
  if(TD.idx===-1)return;
  if(TD.on){
    TD.clone?.remove();
    document.querySelectorAll('.profile-tab:not(.nearby-tab)').forEach(t=>t.classList.remove('tab-ghost','tab-slot'));
    const{idx,to}=TD;
    if(idx!==to){const item=profiles.splice(idx,1)[0];profiles.splice(to,0,item);saveProfiles(profiles);renderProfiles()}
  }
  TD={on:false,idx:-1,to:-1,clone:null,startX:0,tabW:72,cloneLeft:0,cloneTop:0};
});

// ═══════════════════════════════════
//  NEARBY
// ═══════════════════════════════════
async function fetchAllStops(){
  if(allStops)return allStops;
  const data=await fetch(`${KMB}/stop`).then(r=>r.json());
  allStops=data.data||[];return allStops;
}
async function loadNearby(){
  const el=document.getElementById('bus-list');
  el.innerHTML=`<div class="spinner"></div>`;
  if(!nearbyLat){
    if(!navigator.geolocation){el.innerHTML=`<div class="msg">此裝置不支援定位</div>`;return}
    if(location.protocol==='file:'){el.innerHTML=`<div class="msg">⚠️ file:// 開啟無法定位<br><small>請部署至網絡後使用</small></div>`;return}
    try{
      const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:10000}));
      nearbyLat=pos.coords.latitude;nearbyLng=pos.coords.longitude;
    }catch{el.innerHTML=`<div class="msg">❌ 定位失敗，請允許位置權限</div>`;return}
  }
  try{
    const stops=await fetchAllStops();
    const nearby=stops.map(s=>({...s,dist:haverDist(nearbyLat,nearbyLng,parseFloat(s.lat),parseFloat(s.long))}))
      .filter(s=>s.dist<=500).sort((a,b)=>a.dist-b.dist).slice(0,10);
    if(!nearby.length){el.innerHTML=`<div class="empty-state"><div class="empty-icon">🚌</div><div class="empty-text">附近無九巴站</div><div class="empty-sub">500米範圍內沒有九巴站點</div></div>`;return}
    const etaResults=await Promise.all(nearby.map(s=>fetch(`${KMB}/stop-eta/${s.stop}`).then(r=>r.json()).catch(()=>({data:[]}))));
    const now=Date.now();const rows=[];
    etaResults.forEach((res,i)=>{
      const stop=nearby[i];const seen=new Set();
      (res.data||[]).forEach(e=>{
        if(!e.eta)return;const ts=new Date(e.eta).getTime();if(ts<now-30000)return;
        const key=`${e.route}_${e.dir}_${stop.stop}`;
        if(!seen.has(key)){
          seen.add(key);
          rows.push({route:e.route,dest:e.dest_tc||'',stopName:stop.name_tc,stopId:stop.stop,dist:Math.round(stop.dist),serviceType:e.service_type||'1',dir:e.dir,_etas:[ts]});
        } else {
          const ex=rows.find(r=>r.route===e.route&&r.dir===e.dir&&r.stopId===stop.stop);
          if(ex&&ex._etas.length<3)ex._etas.push(ts);
        }
      });
    });
    rows.sort((a,b)=>a._etas[0]-b._etas[0]);
    if(!rows.length){el.innerHTML=`<div class="empty-state"><div class="empty-icon">⏱</div><div class="empty-text">暫無班次</div></div>`;return}
    const now2=Date.now();
    el.innerHTML=rows.slice(0,20).map((r,i)=>{
      const m=Math.round((r._etas[0]-now2)/60000);
      const urgency=m<=2?'soon':m<=8?'coming':'ok';
      const cc=m<=2?'sc':m<=8?'cc':'oc';
      const etaHtml=fmtEtas(r._etas,cc,now2);
      return `<div class="bus-card ${urgency}" style="animation-delay:${i*.03}s">
        <div class="bus-badge">${r.route}</div>
        <div class="bus-info"><div class="bus-stop">${r.stopName} <span class="nearby-dist">${r.dist}m</span></div><div class="bus-dest">往 ${r.dest}</div></div>
        <div class="bus-eta-wrap"><div class="eta-row">${etaHtml}</div></div>
      </div>`;
    }).join('');
  }catch(e){console.warn('[nearby]',e);el.innerHTML=`<div class="msg">載入失敗，請重試</div>`}
}

// ═══════════════════════════════════
//  SAVED ROUTES
// ═══════════════════════════════════
function fmtEtas(etas,cc,now){
  const fmt=(ts,cls)=>{
    if(etaMode==='mins'){const m=Math.round((ts-now)/60000);return`<span class="${cls}">${m<=0?'即將':m+'分'}</span>`}
    const d=new Date(ts);return`<span class="${cls}">${pad(d.getHours())}:${pad(d.getMinutes())}</span>`;
  };
  const parts=[];
  if(etas[2])parts.push(fmt(etas[2],'e3'));
  if(etas[1])parts.push(fmt(etas[1],'e2'));
  if(etas[0])parts.push(fmt(etas[0],`e1 ${cc}`));
  return parts.join('');
}

async function fetchOneETA(fav){
  try{
    const data=await fetch(`${KMB}/eta/${fav.stopId}/${fav.route}/${fav.serviceType}`).then(r=>r.json());
    fav._etas=(data.data||[]).filter(e=>e.eta).slice(0,3).map(e=>new Date(e.eta).getTime());
    fav._first=fav._etas[0]??null;fav._err=false;
  }catch{fav._etas=[];fav._first=null;fav._err=true}
}
async function refreshAllETAs(){
  if(activePid===NEARBY_PID){loadNearby();return}
  favs=loadFavs(activePid);
  if(!favs.length){renderBusList();return}
  await Promise.all(favs.map(fetchOneETA));
  renderBusList();
}
function renderBusList(){
  const el=document.getElementById('bus-list');
  if(!favs.length){
    el.innerHTML=`<div class="empty-state"><div class="empty-icon">🚌</div><div class="empty-text">未有路線</div><div class="empty-sub">點擊「加路線」搜尋九巴班次</div></div>`;return;
  }
  const now=Date.now();
  el.innerHTML=favs.map((f,i)=>{
    const m=f._first!=null?Math.round((f._first-now)/60000):null;
    const urgency=m===null?'':m<=2?'soon':m<=8?'coming':'ok';
    const cc=m===null?'oc':m<=2?'sc':m<=8?'cc':'oc';
    let etaHtml='';
    if(f._err)etaHtml=`<span class="e-none">無數據</span>`;
    else if(!f._etas?.length)etaHtml=`<span class="e-none">無班次</span>`;
    else etaHtml=fmtEtas(f._etas,cc,now);
    return `<div class="bus-card ${urgency}" style="animation-delay:${i*.04}s">
      <div class="drag-handle" ontouchstart="busDragStart(event,${i})">⠿</div>
      <div class="bus-badge">${f.route}</div>
      <div class="bus-info"><div class="bus-stop">${f.stopName}</div><div class="bus-dest">往 ${f.dest}</div></div>
      <div class="bus-eta-wrap"><div class="eta-row">${etaHtml}</div></div>
      <button class="bus-rm" onclick="removeFav(event,${i})">×</button>
    </div>`;
  }).join('');
}
function removeFav(e,i){e.stopPropagation();favs.splice(i,1);saveFavs(activePid,favs);renderBusList()}

// ── Bus drag ──
let BD={on:false,idx:-1,to:-1,clone:null,startY:0,startTop:0,cardH:0};
function busDragStart(e,idx){
  e.stopPropagation();
  const card=document.querySelectorAll('.bus-card')[idx];if(!card)return;
  const rect=card.getBoundingClientRect();
  BD={on:true,idx,to:idx,startY:e.touches[0].clientY,startTop:rect.top,cardH:rect.height+9,clone:null};
  const cl=card.cloneNode(true);cl.className='float-clone';
  cl.style.cssText=`left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;border-radius:13px`;
  document.body.appendChild(cl);BD.clone=cl;card.classList.add('card-ghost');
}
document.addEventListener('touchmove',e=>{
  if(!BD.on)return;const dy=e.touches[0].clientY-BD.startY;BD.clone.style.top=(BD.startTop+dy)+'px';
  const ni=Math.max(0,Math.min(favs.length-1,BD.idx+Math.round(dy/BD.cardH)));
  if(ni!==BD.to){BD.to=ni;document.querySelectorAll('.bus-card').forEach((c,i)=>c.classList.toggle('card-slot',i===ni&&i!==BD.idx))}
},{passive:true});
document.addEventListener('touchend',()=>{
  if(!BD.on)return;BD.clone?.remove();BD.on=false;
  const{idx,to}=BD;BD.idx=-1;BD.to=-1;
  if(idx!==to){const item=favs.splice(idx,1)[0];favs.splice(to,0,item);saveFavs(activePid,favs);fetchOneETA(favs[to]).then(renderBusList)}
  else renderBusList();
});

// ═══════════════════════════════════
//  SEARCH
// ═══════════════════════════════════
function openSearch(){
  setDTitle('搜尋路線');
  document.getElementById('drawer-body').innerHTML=`
    <div class="search-row">
      <input class="d-input" id="route-inp" placeholder="路線號碼（如 40X）"
        maxlength="6" oninput="this.value=this.value.toUpperCase()"
        onkeydown="if(event.key==='Enter')searchRoute()">
      <button class="d-btn" onclick="searchRoute()">搜尋</button>
    </div>
    <div id="search-results"></div>`;
  openOverlay();setTimeout(()=>document.getElementById('route-inp')?.focus(),260);
}
async function searchRoute(){
  const q=(document.getElementById('route-inp')?.value||'').trim().toUpperCase();if(!q)return;
  const el=document.getElementById('search-results');el.innerHTML=`<div class="spinner"></div>`;
  try{
    const data=await fetch(`${KMB}/route/`).then(r=>r.json());
    const routes=data.data.filter(r=>r.route===q);
    if(!routes.length){el.innerHTML=`<div class="msg">找不到路線「${q}」</div>`;return}
    el.innerHTML=`<div class="sec-lbl">選擇方向</div>`+routes.map(r=>
      `<div class="result-item" onclick="pickRoute('${r.route}','${r.bound}','${r.service_type}','${esc(r.dest_tc)}')">
        <div class="rn">${r.route}</div>
        <div class="ri"><div class="ri-dest">往 ${r.dest_tc}</div><div class="ri-orig">由 ${r.orig_tc}</div></div>
        <div class="chev">›</div>
      </div>`).join('');
  }catch{el.innerHTML=`<div class="msg">載入失敗，請重試</div>`}
}
async function pickRoute(route,bound,svcType,dest){
  setDTitle(`${route} 往 ${dest}`);
  const el=document.getElementById('search-results');
  el.innerHTML=`<button class="back-link" onclick="backToSearch()">‹ 返回</button><div class="spinner"></div>`;
  try{
    const dir=bound==='O'?'outbound':'inbound';
    const[sd,si]=await Promise.all([
      fetch(`${KMB}/route-stop/${route}/${dir}/${svcType}`).then(r=>r.json()),
      fetch(`${KMB}/stop`).then(r=>r.json()),
    ]);
    const sm={};si.data.forEach(s=>sm[s.stop]=s.name_tc);
    const stops=sd.data.map(s=>({seq:s.seq,stopId:s.stop,name:sm[s.stop]||s.stop}));
    el.innerHTML=`<button class="back-link" onclick="backToSearch()">‹ 返回</button>
      <div class="sec-lbl">選擇巴士站（${stops.length} 站）</div>
      <div style="max-height:55dvh;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--bdr) transparent">
        ${stops.map(s=>`<div class="stop-item" onclick="addFav('${s.stopId}','${esc(s.name)}','${route}','${esc(dest)}','${svcType}')">
          <div class="stop-seq">${s.seq}</div><div class="stop-name">${s.name}</div><div class="chev">›</div>
        </div>`).join('')}
      </div>`;
  }catch{el.innerHTML=`<button class="back-link" onclick="backToSearch()">‹ 返回</button><div class="msg">載入失敗，請重試</div>`}
}
function backToSearch(){setDTitle('搜尋路線');document.getElementById('search-results').innerHTML=''}
async function addFav(stopId,stopName,route,dest,serviceType){
  if(!favs.some(f=>f.route===route&&f.stopId===stopId&&f.dest===dest))
    favs.push({route,stopId,stopName,dest,serviceType,_etas:[],_first:null,_err:false});
  saveFavs(activePid,favs);closeDrawer();await refreshAllETAs();
}

// ═══════════════════════════════════
//  IMPORT / EXPORT
// ═══════════════════════════════════
function exportBusData(){
  const data={profiles,favsByProfile:{}};
  profiles.forEach(p=>{data.favsByProfile[p.id]=loadFavs(p.id)});
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`swd-bus-${new Date().toISOString().slice(0,10)}.json`;
  a.click();URL.revokeObjectURL(a.href);
  showToast('✅ 已匯出巴士資料');
}
function importBusData(event){
  const file=event.target.files?.[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.profiles||!data.favsByProfile)throw new Error('格式錯誤');
      if(!confirm(`確定匯入？這將覆蓋現有 ${data.profiles.length} 個版面的路線資料。`))return;
      profiles=data.profiles;saveProfiles(profiles);
      Object.entries(data.favsByProfile).forEach(([pid,arr])=>saveFavs(pid,arr));
      activePid=profiles[0]?.id||'';setActivePid(activePid);
      favs=loadFavs(activePid);
      renderProfiles();refreshAllETAs();
      showToast('✅ 匯入成功');
    }catch{showToast('❌ 檔案格式不正確')}
  };
  reader.readAsText(file);
  event.target.value='';
}

// ═══════════════════════════════════
//  TOAST
// ═══════════════════════════════════
let toastTimer=null;
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2500);
}

// ═══════════════════════════════════
function openOverlay(){document.getElementById('overlay').classList.add('open')}
function closeDrawer(){document.getElementById('overlay').classList.remove('open')}
function overlayBgClick(e){if(e.target.id==='overlay')closeDrawer()}
function setDTitle(t){document.getElementById('drawer-title').textContent=t}
function esc(s){return s.replace(/'/g,"\\'")}
